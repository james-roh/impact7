<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>임팩트세븐 통합관리</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', Arial, sans-serif;
      background: #f5f7fa;
      color: #222;
      height: 100vh;
      overflow: hidden;
    }
    .layout {
      display: flex;
      height: 100vh;
    }

    /* 사이드바 */
    .sidebar {
      width: 240px;
      background: #1f4e5f;
      color: white;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar h1 {
      font-size: 17px;
      font-weight: 700;
      padding: 22px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      letter-spacing: -0.02em;
    }
    .menu {
      flex: 1;
      padding: 12px 0;
    }
    .menu-item {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      font-family: inherit;
      padding: 13px 22px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s;
    }
    .menu-item:hover {
      background: rgba(255,255,255,0.08);
    }
    .menu-item.active {
      background: rgba(255,255,255,0.12);
      border-left-color: #6BAEC4;
      color: white;
      font-weight: 600;
    }
    .menu-item .badge {
      font-size: 11px;
      background: rgba(255,255,255,0.2);
      padding: 2px 7px;
      border-radius: 10px;
      margin-left: 6px;
    }

    /* 메인 콘텐츠 */
    .content {
      flex: 1;
      position: relative;
      background: white;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
    iframe.active {
      display: block;
    }

    /* 준비중 안내 */
    .placeholder {
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      color: #6c7a89;
    }
    .placeholder.active {
      display: flex;
    }
    .placeholder .icon {
      font-size: 60px;
      margin-bottom: 16px;
    }
    .placeholder h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1f4e5f;
      margin-bottom: 8px;
    }
    .placeholder p {
      font-size: 14px;
      color: #8faab5;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>임팩트세븐 통합관리</h1>
      <nav class="menu">
        <button class="menu-item active" onclick="showPage('staff', this)">
          1. 인원현황 <span class="badge">준비중</span>
        </button>
        <button class="menu-item" onclick="showPage('schedule', this)">
          2. 근무일정 <span class="badge">준비중</span>
        </button>
        <button class="menu-item" onclick="showPage('paper', this)">
          3. 서류발급
        </button>
        <button class="menu-item" onclick="showPage('vacation', this)">
          4. 휴가현황
        </button>
        <button class="menu-item" onclick="showPage('evaluation', this)">
          5. 강사평가
        </button>
      </nav>
    </aside>

    <main class="content">
      <!-- 준비중 페이지 -->
      <div id="staff" class="placeholder active">
        <div class="icon">👥</div>
        <h2>인원현황</h2>
        <p>준비 중입니다</p>
      </div>
      <div id="schedule" class="placeholder">
        <div class="icon">📅</div>
        <h2>근무일정</h2>
        <p>준비 중입니다</p>
      </div>

      <!-- 실제 앱 -->
      <iframe id="paper" src="./paper/index.html?v=21"></iframe>

      <iframe id="vacation" src="./vacation.html"></iframe>
      <iframe id="evaluation" src="./evaluation.html"></iframe>
    </main>
  </div>

  <script>
    function showPage(id, btn) {
      document.querySelectorAll('iframe, .placeholder').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
