<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary:  #1B6B45;
    --primary-h:#145235;
    --success:  #10B981;
    --warning:  #F59E0B;
    --danger:   #EF4444;
    --bg:       #EDEAE3;
    --sidebar:  #D6D2C8;
    --card:     #FFFFFF;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-800: #1F2937;
    --radius:   12px;
    --shadow:   0 2px 12px rgba(0,0,0,.07);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif, 'Malgun Gothic';
    background: var(--bg);
    color: var(--gray-800);
  }

  /* ── 메인 컨테이너 ── */
  .main-container { padding: 25px; max-width: 760px; }
  .main-system-title {
    font-size: 22px; font-weight: 800;
    color: #111; margin-bottom: 20px; letter-spacing: -0.5px;
  }

  /* ── 탭 바 ── */
  .tab-bar {
    display: flex; gap: 0;
    border-bottom: 2px solid var(--gray-200);
    margin-bottom: 20px;
  }
    .tab-btn {
    padding: 11px 20px; border: none; background: transparent;
    font-size: 1rem; font-weight: 800; color: #111;
    cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -2px; transition: all .2s;
  }

  .tab-btn:hover { color: var(--primary); }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* ── 카드 ── */
  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 22px; margin-bottom: 18px;
  }
  .card-title {
    font-size: .95rem; font-weight: 700; color: var(--gray-800);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }

  /* ── 입력 폼 ── */
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media(max-width:768px){ .input-grid{ grid-template-columns:1fr; } }

  label { display: block; font-size: .83rem; font-weight: 700;
    color: var(--gray-700); margin-bottom: 5px; }
  textarea, input[type=text] {
    width: 100%; border: 1.5px solid var(--gray-200);
    border-radius: 10px; padding: 10px 13px;
    font-size: .92rem; font-family: inherit;
    transition: border .2s; resize: none;
    background: #FAFAFA;
  }

  textarea:focus, input[type=text]:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(27,107,69,.1);
    background: #fff;
  }
  .input-hint {
    font-size: .76rem; color: var(--gray-600);
    margin-top: 6px; line-height: 1.6;
  }

  /* ── 버튼 ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: 10px; border: none;
    font-size: .88rem; font-weight: 700; cursor: pointer; transition: all .2s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-h); transform: translateY(-1px); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { filter: brightness(1.08); }
  .btn-outline {
    background: transparent; border: 1.5px solid var(--gray-300); color: var(--gray-700);
  }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }
  .btn-group { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

  /* ── 테이블 ── */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--gray-200); }
  table { width: 100%; border-collapse: collapse; font-size: .84rem; }
  thead tr { background: #F9FAFB; }
  th {
    padding: 10px 13px; text-align: left; font-weight: 700;
    color: var(--gray-600); border-bottom: 1.5px solid var(--gray-200); white-space: nowrap;
  }
  td { padding: 9px 13px; border-bottom: 1px solid #F3F4F6; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #F9FAFB; }

  /* ── 배지 ── */
  .badge {
    display: inline-block; padding: 2px 9px;
    border-radius: 20px; font-size: .73rem; font-weight: 700;
  }
  .badge-blue   { background:#EEF2FF; color:#4338CA; }
  .badge-green  { background:#D1FAE5; color:#065F46; }
  .badge-yellow { background:#FEF3C7; color:#92400E; }
  .badge-purple { background:#F3E8FF; color:#6B21A8; }
  .badge-red    { background:#FEE2E2; color:#991B1B; }
  .badge-gray   { background:#F3F4F6; color:#4B5563; }

  /* ── 요약 카드 ── */
  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 12px; margin-bottom: 18px;
  }
  .summary-card {
    background: var(--card); border-radius: var(--radius);
    padding: 15px 18px; box-shadow: var(--shadow);
    border-left: 4px solid var(--gray-300);
  }
  .summary-card.danger  { border-left-color: var(--danger); }
  .summary-card.success { border-left-color: var(--success); }
  .s-label { font-size: .75rem; color: var(--gray-600); font-weight: 700; }
  .s-value { font-size: 1.5rem; font-weight: 800; margin-top: 3px; }

  /* ── 재고 부족 강조 ── */
  .stock-low td { background: #FFF7ED !important; }
  .stock-num-low  { color: var(--danger);  font-weight: 800; }
  .stock-num-warn { color: var(--warning); font-weight: 700; }

  /* ── 오류 박스 ── */
  .error-item {
    background: #FEF2F2; border: 1px solid #FECACA;
    border-radius: 8px; padding: 9px 13px;
    font-size: .83rem; color: var(--danger); margin-bottom: 6px;
  }
  .error-item strong { display: block; margin-bottom: 2px; }

  /* ── 필터 버튼 ── */
  .filter-wrap { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .filter-btn {
    padding: 5px 13px; border-radius: 20px;
    border: 1.5px solid var(--gray-300); background: #fff;
    font-size: .8rem; font-weight: 700; cursor: pointer;
    transition: all .2s; color: var(--gray-600);
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--primary); color: var(--primary); background: #ECFDF5;
  }

  /* ── 로딩 스피너 ── */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--gray-200); border-top-color: var(--primary);
    border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 토스트 ── */
  #toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--gray-800); color: #fff;
    padding: 11px 20px; border-radius: 10px;
    font-size: .88rem; font-weight: 700;
    box-shadow: 0 4px 20px rgba(0,0,0,.18);
    opacity: 0; transform: translateY(10px);
    transition: all .3s; z-index: 9999; max-width: 320px;
  }
  #toast.show   { opacity: 1; transform: translateY(0); }
  #toast.success{ background: var(--success); }
  #toast.error  { background: var(--danger); }
  #toast.warning{ background: var(--warning); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .refresh-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  }
  .updated-at { font-size: .76rem; color: var(--gray-600); }
  code {
    font-size: .78rem; background: #F3F4F6;
    padding: 2px 6px; border-radius: 4px;
  }
</style>

<div id="processingOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99999;align-items:center;justify-content:center;">

<script>
// 중복 체크 후 출고 처리
function checkDuplicateAndCheckout(processor) {

  const oneWeekAgo = new Date();
  oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);

  // 최근 7일 출고 내역에서 같은 학생+교재 찾기
  fetch(API_URL + '?action=getRecords')
    .then(r => r.json())
    .then(data => {
      const recentRows = (data.rows || []).filter(r => {
        const d = new Date(r['날짜']);
        return d >= oneWeekAgo;
      });

      const duplicates = [];
      parsedItems.forEach(item => {
        recentRows.forEach(rec => {
          if (
            rec['학생명'] === item.studentName &&
            rec['교재명'] === item.bookName &&
            rec['종류'] === item.bookType
          ) {
            duplicates.push({
              date: rec['날짜'],
              student: rec['학생명'],
              classCode: rec['반코드'],
              book: rec['교재명'],
              type: rec['종류']
            });
          }
        });
      });

      if (duplicates.length > 0) {
        // 중복 발견 - 경고 모달 표시
        const listHtml = duplicates.map(d =>
          `• ${formatDate(d.date)} | ${d.classCode} ${d.student} | ${d.book} (${d.type})`
        ).join('<br>');
        document.getElementById('duplicateList').innerHTML = listHtml;
        document.getElementById('duplicateOverlay').style.display = 'flex';
        window._pendingProcessor = processor;
      } else {
        // 중복 없음 - 바로 처리
        executeCheckout(processor);
      }
    })
    .catch(() => {
      // 조회 실패 시 그냥 처리
      executeCheckout(processor);
    });
}
function cancelDuplicate() {
  document.getElementById('duplicateOverlay').style.display = 'none';
  window._pendingProcessor = null;
  showToast('출고가 취소되었습니다.', 'warning');
}

function proceedDuplicate() {
  document.getElementById('duplicateOverlay').style.display = 'none';
  const processor = window._pendingProcessor || window._userId || '관리자';
  window._pendingProcessor = null;
  executeCheckout(processor);
}
</script>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxJsPJINJgwVOIeEYaK9EQtrNydRFETcneUkNhaKlTWc3p9HZ2DyFjLpUmMOc5_bPmDIg/exec';

let parsedItems   = [];
let inventoryData = [];
let currentFilter = 'all';

function callAPI(params) {
  if (params.text || params.items || params.processor) {
    // 텍스트나 데이터가 있으면 POST 방식으로 전송
    return fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params)
    })
    .then(() => fetch(API_URL + '?action=preview&_=' + Date.now()))
    .then(r => r.json());
  }
  // 데이터 없으면 GET 방식
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  return fetch(url, { method: 'GET' })
    .then(r => r.json());
}


function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'inventory') loadInventory();
}

function showToast(msg, type = '', duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => { t.className = ''; }, duration);
}

// ── 미리보기 ──
function doParse() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showToast('입력 내용이 없습니다.', 'error'); return; }
  showToast('분석 중...', '');
  const url = API_URL + '?action=preview&text=' + encodeURIComponent(text);
  fetch(url)
    .then(r => r.json())
    .then(onParseSuccess)
    .catch(err => showToast('오류: ' + err.message, 'error'));
}

function onParseSuccess(result) {
  parsedItems = result.results || [];
  const section = document.getElementById('previewSection');
  section.style.display = 'block';

  const wrap = document.getElementById('previewTableWrap');
  if (parsedItems.length > 0) {
    const campusBadge = { '양지5':'badge-blue', '양지10':'badge-green', '10단지':'badge-purple' };
    const catBadge    = { '어휘':'badge-blue', '영작':'badge-green', '숙어':'badge-yellow', '기타':'badge-gray' };
    let html = `<p style="font-size:.85rem;font-weight:700;margin-bottom:8px;color:var(--primary);">
      ✅ 인식된 항목 ${parsedItems.length}건</p>
      <div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>원본</th><th>반코드</th><th>캠퍼스</th>
        <th>학부</th><th>요일</th><th>학생명</th><th>교재명</th><th>분류</th>
      </tr></thead><tbody>`;
    parsedItems.forEach((item, i) => {
      html += `<tr>
        <td>${i+1}</td>
        <td><code>${item.raw}</code></td>
        <td><strong>${item.classCode}</strong></td>
        <td><span class="badge ${campusBadge[item.campus]||'badge-gray'}">${item.campus}</span></td>
        <td>${item.dept}</td>
        <td>${item.dayType}</td>
        <td><strong>${item.studentName}</strong></td>
        <td>${item.bookName}</td>
        <td><span class="badge ${catBadge[item.category]||'badge-gray'}">${item.category}</span></td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    wrap.innerHTML = html;
  } else {
    wrap.innerHTML = '';
  }

  const errDiv = document.getElementById('previewErrors');
  const errors = result.errors || [];
  if (errors.length > 0) {
    let eHtml = `<p style="font-size:.85rem;font-weight:700;margin-top:12px;margin-bottom:6px;color:var(--danger);">
      ❌ 인식 실패 ${errors.length}건</p>`;
    errors.forEach(e => {
      eHtml += `<div class="error-item"><strong>${e.line}</strong>${e.reason}</div>`;
    });
    errDiv.innerHTML = eHtml;
  } else {
    errDiv.innerHTML = '';
  }

  const btn = document.getElementById('checkoutBtn');
  btn.disabled = false;

  if (parsedItems.length > 0)
    showToast(`${parsedItems.length}건 인식 완료! 출고 처리 버튼을 눌러주세요.`, 'success');
  else
    showToast('인식된 항목이 없습니다.', 'warning');
}

// ── 출고 처리 ──
function doCheckout() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showToast('출고 목록을 입력하세요.', 'error'); return; }

 

  const url = API_URL + '?action=preview&text=' + encodeURIComponent(text);


  fetch(url)
    .then(r => r.json())
    .then(result => {
      parsedItems = result.results || [];
      const errors = result.errors || [];

      if (errors.length > 0) {
        showGuideError(errors);
        return;
      }

      if (parsedItems.length === 0) {
        showToast('인식된 항목이 없습니다. 입력 형식을 확인하세요.', 'warning');
        return;
      }
      showConfirm();
    })
    .catch(err => showToast('오류: ' + err.message, 'error'));
}


function executeCheckout(processor) {
  console.log('처리자:', processor);
  const btn = document.getElementById('checkoutBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 처리 중...';
  document.getElementById('processingOverlay').style.display = 'flex';


  const url = API_URL 
    + '?action=checkout'
    + '&items=' + encodeURIComponent(JSON.stringify(parsedItems))
    + '&processor=' + encodeURIComponent(processor);

  fetch(url)
    .then(r => r.json())
    .then(result => {
      btn.innerHTML = '<i class="fas fa-check"></i> 출고 처리';
      btn.disabled = false;
      console.log('API 응답:', JSON.stringify(result));
      document.getElementById('processingOverlay').style.display = 'none';
      if(result.successCount > 0){
        showToast(`🎉 ${result.successCount}건 출고 처리 완료!`, 'success', 4000);

        parsedItems = [];
        clearAll();
        loadRecords();
      } else if(result.failList && result.failList.length > 0){
        showToast('오류: ' + result.failList[0].error, 'error');
      } else {
        showToast('처리 결과: ' + JSON.stringify(result), 'error');
      }
    })
       .catch(err => {
      document.getElementById('processingOverlay').style.display = 'none';
      btn.innerHTML = '<i class="fas fa-check"></i> 출고 처리';
      btn.disabled = false;

      showToast('오류: ' + err.message, 'error');
    });
}



// ── 초기화 ──
function clearAll() {
  const textarea = document.getElementById('inputText');
  textarea.value = '';
  textarea.focus();
  parsedItems = [];
  showToast('초기화 완료!', '');
}
function showGuideError(errors) {
  const modal = document.getElementById('guideErrorModal');
  const list  = document.getElementById('guideErrorList');
  let html = '';
  errors.forEach(e => {
    html += `<div style="padding:8px 12px;background:#FEF2F2;border-radius:8px;
      margin-bottom:8px;border-left:3px solid var(--danger);">
      <strong>${e.line}</strong><br>
      <span style="color:var(--danger);">${e.reason}</span>
    </div>`;
  });
  list.innerHTML = html;
  modal.style.display = 'flex';
}

function closeGuideError() {
  document.getElementById('guideErrorModal').style.display = 'none';
}

function showConfirm() {
  const modal = document.getElementById('confirmModal');
  const list  = document.getElementById('confirmList');

  let html = '';
  parsedItems.forEach(item => {
    html += `
      <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--gray-200);">
        <div style="font-size:.92rem;font-weight:700;color:#111;margin-bottom:8px;">
          ${item.classCode} ${item.studentName} &nbsp;
          <span class="badge badge-blue">${item.campus}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:.88rem;cursor:pointer;">
            <input type="checkbox" checked style="width:16px;height:16px;accent-color:var(--primary);">
            ${item.bookName} TEXTBOOK
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:.88rem;cursor:pointer;">
            <input type="checkbox" checked style="width:16px;height:16px;accent-color:var(--primary);">
            ${item.bookName} WORKBOOK
          </label>
        </div>
      </div>`;
  });

  list.innerHTML = html;
  modal.style.display = 'flex';
}

function closeConfirm() {
  document.getElementById('confirmModal').style.display = 'none';
}

function confirmCheckout() {
  const checkedItems = [];
  const checkboxes = document.querySelectorAll('#confirmList input[type=checkbox]');
  
  parsedItems.forEach((item, idx) => {
    const tbCheck = checkboxes[idx * 2];
    const wbCheck = checkboxes[idx * 2 + 1];
    if(tbCheck && tbCheck.checked){
      checkedItems.push({...item, bookType: 'TEXTBOOK'});
    }
    if(wbCheck && wbCheck.checked){
      checkedItems.push({...item, bookType: 'WORKBOOK'});
    }
  });
  
  parsedItems = checkedItems;
  closeConfirm();
  const processor = window._userId || '관리자';
  checkDuplicateAndCheckout(processor);

}




// ── 재고 현황 ──
function loadInventory() {
  document.getElementById('inventoryBody').innerHTML =
    '<tr><td colspan="6" style="text-align:center;padding:36px;"><span class="spinner"></span> 로딩 중...</td></tr>';

  const url = API_URL + '?action=getInventory';
  fetch(url)
    .then(r => r.json())
    .then(onInventoryLoaded)
    .catch(err => {
      showToast('재고 로드 오류: ' + err.message, 'error');
      document.getElementById('inventoryBody').innerHTML =
        '<tr><td colspan="6" style="text-align:center;padding:36px;color:var(--danger);">❌ 데이터 로드 실패</td></tr>';
    });
}

function onInventoryLoaded(data) {
  if (data.error) { showToast(data.error, 'error'); return; }
  inventoryData = data.rows || [];
  document.getElementById('invUpdatedAt').textContent = '갱신: ' + (data.updatedAt || '');
  renderInventoryTable(currentFilter);
}


function filterInventory(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderInventoryTable(filter);
}

function renderInventoryTable(filter) {
  let rows = inventoryData;
  if (filter === 'low')           rows = rows.filter(r => r['부족여부']);
  else if (filter === 'TEXTBOOK') rows = rows.filter(r => r['종류'] === 'TEXTBOOK');
  else if (filter === 'WORKBOOK') rows = rows.filter(r => r['종류'] === 'WORKBOOK');

  const tbody = document.getElementById('inventoryBody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:36px;color:var(--gray-600);">해당 조건의 교재가 없습니다.</td></tr>';
    return;
  }

  // 교재명 기준으로 그룹화
  const groups = [];
  rows.forEach(r => {
    const last = groups[groups.length - 1];
    if (last && last.name === r['교재명']) {
      last.items.push(r);
    } else {
      groups.push({ name: r['교재명'], items: [r] });
    }
  });

  let html = '';
  groups.forEach(g => {
    const count = g.items.length;

    if (count === 1) {
      // 단일 행 - rowspan 없이 일반 행으로 처리
      const r = g.items[0];
      html += `<tr style="background:#fff;border-bottom:2px solid #e5e7eb;">
        <td style="text-align:left;vertical-align:middle;font-weight:700;padding-left:12px;background:#fff;">${r['교재명']}</td>
        <td style="text-align:center;background:#fff;">
          <span class="badge ${r['종류']==='TEXTBOOK'?'badge-blue':'badge-green'}">${r['종류']}</span>
        </td>
        <td style="text-align:center;background:#fff;">${r['양지5']}</td>
        <td style="text-align:center;background:#fff;">${r['양지10']}</td>
        <td style="text-align:center;background:#fff;">${r['10단지']}</td>
      </tr>`;
    } else {
      // 복수 행 - rowspan 적용
      g.items.forEach((r, i) => {
        const isLast = i === count - 1;
        const borderStyle = isLast ? 'border-bottom:2px solid #e5e7eb;' : '';
        html += `<tr style="background:#fff;">`;

        if (i === 0) {
          html += `<td rowspan="${count}" style="
            text-align:left;
            vertical-align:middle;
            font-weight:700;
            padding-left:12px;
            background:#fff;
            border-bottom:2px solid #e5e7eb;
          ">${r['교재명']}</td>`;
        }

        html += `
          <td style="text-align:center;${borderStyle}background:#fff;">
            <span class="badge ${r['종류']==='TEXTBOOK'?'badge-blue':'badge-green'}">${r['종류']}</span>
          </td>
          <td style="text-align:center;${borderStyle}background:#fff;">${r['양지5']}</td>
          <td style="text-align:center;${borderStyle}background:#fff;">${r['양지10']}</td>
          <td style="text-align:center;${borderStyle}background:#fff;">${r['10단지']}</td>
        </tr>`;
      });
    }
  });

  tbody.innerHTML = html;
}


// ── 출고 내역 ──
function loadRecords() {
  document.getElementById('recordsBody').innerHTML =
    '<tr><td colspan="6" style="text-align:center;padding:36px;"><span class="spinner"></span> 로딩 중...</td></tr>';

  const recordsPromise   = callAPI({ action: 'getRecords' });
  const inventoryPromise = inventoryData.length === 0
    ? callAPI({ action: 'getInventory' }).then(data => { inventoryData = data.rows || []; })
    : Promise.resolve();

  Promise.all([recordsPromise, inventoryPromise])
    .then(([recordsData]) => onRecordsLoaded(recordsData))
    .catch(err => showToast('내역 로드 오류: ' + err.message, 'error'));
}

function onRecordsLoaded(data) {
  if (data.error) { showToast(data.error, 'error'); return; }
  const tbody = document.getElementById('recordsBody');
  if (!data.rows || data.rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:36px;color:var(--gray-600);">출고 내역이 없습니다.</td></tr>';
    return;
  }
  const cb = { '양지5':'badge-blue','양지10':'badge-green','10단지':'badge-purple' };
   tbody.innerHTML = data.rows.map(r => `<tr>
    <td>${formatDate(r['날짜'])}</td>
    <td><strong>${r['반코드']}</strong> ${r['학생명']}</td>
       <td>${r['교재명']} <span style="font-size:.75rem;color:var(--gray-500);">${r['종류']||''}</span></td>

    <td>${r['수량']}</td>
    <td>${r['처리자']}</td>

  </tr>`).join('');

}

function getCurrentStock(bookName, campus) {
  if (!inventoryData || inventoryData.length === 0) return '-';
  const norm    = bookName.replace(/\s/g, '').toLowerCase();
  const matched = inventoryData.find(r =>
    r['교재명'].replace(/\s/g, '').toLowerCase() === norm && r['종류'] === 'TEXTBOOK'
  ) || inventoryData.find(r =>
    r['교재명'].replace(/\s/g, '').toLowerCase() === norm
  );
  if (!matched) return '-';
  const stock = matched[campus];
  if (stock === undefined) return '-';
  const isLow = stock < matched['권장수량'];
  return `<span class="${isLow ? 'stock-num-low' : ''}">${stock}</span>`;
}


function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleString('ko-KR', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  });
}

          window._userId = userId;

function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const email = payload.email || '';
  if (!email.endsWith('@impact7.kr')) {
    alert('학원 공식 계정(@impact7.kr)으로 로그인해주세요!');
    return;
  }
  const userId = email.split('@')[0];
  localStorage.setItem('impact7_user', userId);
  window._userId = userId;
  document.getElementById('processorDisplay').textContent = userId;
  document.getElementById('loginOverlay').style.display = 'none';
}


window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('impact7_user');
  if (saved) {
    window._userId = saved.split('@')[0];
    document.getElementById('processorDisplay').textContent = saved;
    document.getElementById('loginOverlay').style.display = 'none';
    loadInventory();
    loadRecords();
  } else {
    window.onGoogleLibraryLoad = function() {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse,
        hosted_domain: 'impact7.kr'
      });
      google.accounts.id.prompt();
    };
    loadInventory();
    loadRecords();
  }
});


</script>
