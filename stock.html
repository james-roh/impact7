<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교재 재고 관리</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="sidebar.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary:  #1B6B45;
    --primary-h:#145235;
    --success:  #10B981;
    --warning:  #F59E0B;
    --danger:   #EF4444;
    --bg:       #EDEAE3;
    --sidebar:  #D6D2C8;
    --card:     #FFFFFF;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-800: #1F2937;
    --radius:   12px;
    --shadow:   0 2px 12px rgba(0,0,0,.07);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif, 'Malgun Gothic';
    background: var(--bg);
    color: var(--gray-800);
  }
  .main-container { padding: 25px; max-width: 760px; }
  .main-system-title {
    font-size: 22px; font-weight: 800;
    color: #111; margin-bottom: 20px; letter-spacing: -0.5px;
  }
  .tab-bar {
    display: flex; gap: 0;
    border-bottom: 2px solid var(--gray-200);
    margin-bottom: 20px;
  }
  .tab-btn {
    padding: 11px 20px; border: none; background: transparent;
    font-size: 1rem; font-weight: 800; color: #111;
    cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -2px; transition: all .2s;
  }
  .tab-btn:hover { color: var(--primary); }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 22px; margin-bottom: 18px;
  }
  .card-title {
    font-size: .95rem; font-weight: 700; color: var(--gray-800);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media(max-width:768px){ .input-grid{ grid-template-columns:1fr; } }
  label { display: block; font-size: .83rem; font-weight: 700;
    color: var(--gray-700); margin-bottom: 5px; }
  textarea, input[type=text] {
    width: 100%; border: 1.5px solid var(--gray-200);
    border-radius: 10px; padding: 10px 13px;
    font-size: .92rem; font-family: inherit;
    transition: border .2s; resize: none;
    background: #FAFAFA;
  }
  textarea:focus, input[type=text]:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(27,107,69,.1);
    background: #fff;
  }
  .input-hint {
    font-size: .76rem; color: var(--gray-600);
    margin-top: 6px; line-height: 1.6;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: 10px; border: none;
    font-size: .88rem; font-weight: 700; cursor: pointer; transition: all .2s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-h); transform: translateY(-1px); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { filter: brightness(1.08); }
  .btn-outline {
    background: transparent; border: 1.5px solid var(--gray-300); color: var(--gray-700);
  }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }
  .btn-group { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--gray-200); }
  table { width: 100%; border-collapse: collapse; font-size: .84rem; }
  thead tr { background: #F9FAFB; }
  th {
    padding: 10px 13px; text-align: left; font-weight: 700;
    color: var(--gray-600); border-bottom: 1.5px solid var(--gray-200); white-space: nowrap;
  }
  td { padding: 9px 13px; border-bottom: 1px solid #F3F4F6; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #F9FAFB; }
  .badge {
    display: inline-block; padding: 2px 9px;
    border-radius: 20px; font-size: .73rem; font-weight: 700;
  }
  .badge-blue   { background:#EEF2FF; color:#4338CA; }
  .badge-green  { background:#D1FAE5; color:#065F46; }
  .badge-yellow { background:#FEF3C7; color:#92400E; }
  .badge-purple { background:#F3E8FF; color:#6B21A8; }
  .badge-red    { background:#FEE2E2; color:#991B1B; }
  .badge-gray   { background:#F3F4F6; color:#4B5563; }
  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 12px; margin-bottom: 18px;
  }
  .summary-card {
    background: var(--card); border-radius: var(--radius);
    padding: 15px 18px; box-shadow: var(--shadow);
    border-left: 4px solid var(--gray-300);
  }
  .summary-card.danger  { border-left-color: var(--danger); }
  .summary-card.success { border-left-color: var(--success); }
  .s-label { font-size: .75rem; color: var(--gray-600); font-weight: 700; }
  .s-value { font-size: 1.5rem; font-weight: 800; margin-top: 3px; }
  .stock-low td { background: #FFF7ED !important; }
  .stock-num-low  { color: var(--danger);  font-weight: 800; }
  .stock-num-warn { color: var(--warning); font-weight: 700; }
  .error-item {
    background: #FEF2F2; border: 1px solid #FECACA;
    border-radius: 8px; padding: 9px 13px;
    font-size: .83rem; color: var(--danger); margin-bottom: 6px;
  }
  .error-item strong { display: block; margin-bottom: 2px; }
  .filter-wrap { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .filter-btn {
    padding: 5px 13px; border-radius: 20px;
    border: 1.5px solid var(--gray-300); background: #fff;
    font-size: .8rem; font-weight: 700; cursor: pointer;
    transition: all .2s; color: var(--gray-600);
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--primary); color: var(--primary); background: #ECFDF5;
  }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--gray-200); border-top-color: var(--primary);
    border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
#toast {
position: fixed; top: 50%; left: 50%; transform: translateX(-50%) translateY(-50%);


    background: var(--gray-800); color: #fff;
    padding: 11px 20px; border-radius: 10px;
    font-size: .88rem; font-weight: 700;
    box-shadow: 0 4px 20px rgba(0,0,0,.18);
    opacity: 0; transform: translateY(10px);
    transition: all .3s; z-index: 9999; max-width: 320px;
  }
#toast.show   { opacity: 1; transform: translateX(-50%) translateY(-50%); }

  #toast.success{ background: var(--success); }
  #toast.error  { background: var(--danger); }
  #toast.warning{ background: var(--warning); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .refresh-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  }
  .updated-at { font-size: .76rem; color: var(--gray-600); }
  code {
    font-size: .78rem; background: #F3F4F6;
    padding: 2px 6px; border-radius: 4px;
  }
</style>
<script src="https://accounts.google.com/gsi/client" onload="if(window.onGoogleLibraryLoad) window.onGoogleLibraryLoad();" defer></script>
</head>
<body>

<div class="main-container">
  <div class="main-system-title">교재 재고 관리</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('input', this)">출고 입력</button>
    <button class="tab-btn" onclick="switchTab('search', this)">학생 검색</button>
    <button class="tab-btn" onclick="switchTab('receiving', this)">입고 처리</button>
  </div>


<div id="tab-search" class="tab-content">

  <div class="card">
    <div class="card-title"><i class="fas fa-magnifying-glass"></i> 학생 출고 이력 검색</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <input type="text" id="searchStudentName" placeholder="학생 이름 입력" 
        style="flex:1;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.95rem;"
        onkeydown="if(event.key==='Enter') searchStudent()">
      <button class="btn btn-primary" onclick="searchStudent()">
        <i class="fas fa-search"></i> 검색
      </button>
    </div>
    <div id="searchResult"></div>
  </div>
</div>

<div id="tab-receiving" class="tab-content">
  <div class="card">
    <div class="card-title"><i class="fas fa-boxes-stacked"></i> 입고 처리</div>
    <div style="font-size:.85rem;color:var(--gray-500);margin-bottom:16px;">수량을 직접 수정 후 저장 버튼을 눌러주세요.</div>
    <div class="table-wrap">
      <table style="table-layout:fixed;width:100%;border-collapse:collapse;">
        <thead>
          <tr>
            <th style="width:30%;padding:8px 4px;">교재명</th>
            <th style="text-align:center;width:20%;padding:8px 4px;">종류</th>
            <th style="text-align:center;width:16%;padding:8px 0;">양지5</th>
            <th style="text-align:center;width:16%;padding:8px 0;">양지10</th>
            <th style="text-align:center;width:18%;padding:8px 0;">10단지</th>
          </tr>
        </thead>
        <tbody id="receivingBody">
          <tr><td colspan="5" style="text-align:center;padding:36px;"><span class="spinner"></span> 로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn btn-outline" onclick="loadReceiving()"><i class="fas fa-rotate-right"></i> 새로고침</button>
      <button class="btn btn-primary" onclick="saveReceiving()"><i class="fas fa-floppy-disk"></i> 저장</button>
    </div>
  </div>
</div>


<div id="tab-input" class="tab-content active">
    <div>
      <div>
        <div class="card">
          <div class="card-title" style="font-size:1rem;font-weight:800;color:#111;">출고 정보 입력</div>
          <div style="display:none;">
            <strong id="processorDisplay"></strong>
          </div>
          <textarea id="inputText" rows="9" style="resize: none;"
            placeholder="아래와 같이 붙혀넣기 후 출고처리를 누르세요&#10;&#10;&#10;I202 임승아 숙어 Fundamental&#10;A201 이서하 보카4&#10;HA131 김민준 ISC3"></textarea>
          <div class="btn-group">
            <button class="btn btn-primary" id="checkoutBtn" onclick="doCheckout()">
              <i class="fas fa-check"></i> 출고 처리
            </button>
            <button class="btn btn-outline" onclick="clearAll()">
              <i class="fas fa-trash"></i> 초기화
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
<div id="bottomSection" style="display:none;">

  <!-- 재고 현황 -->
  <div style="margin-top:32px;">
    <div style="font-size:1.1rem;font-weight:800;color:#111;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--gray-200);">재고 현황</div>
    <div class="card">
      <div class="refresh-row">
        <div class="card-title" style="margin-bottom:0;"><i class="fas fa-boxes-stacked"></i> 교재별 재고 현황</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="updated-at" id="invUpdatedAt"></span>
          <button class="btn btn-outline" onclick="loadInventory()" style="padding:6px 12px;font-size:.8rem;"><i class="fas fa-rotate-right"></i> 새로고침</button>
        </div>
      </div>
      <div class="table-wrap">
        <table style="table-layout:fixed;width:100%;border-collapse:collapse;border-spacing:0;">
          <thead>
            <tr>
              <th style="width:30%;padding:8px 4px;">교재명</th>
              <th style="text-align:center;width:25%;padding:8px 4px;">종류</th>
              <th style="text-align:center;width:15%;padding:8px 0;">양지5</th>
              <th style="text-align:center;width:15%;padding:8px 0;">양지10</th>
              <th style="text-align:center;width:15%;padding:8px 0;">10단지</th>
            </tr>
          </thead>
          <tbody id="inventoryBody">
            <tr><td colspan="5" style="text-align:center;padding:36px;"><span class="spinner"></span> 로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 출고 내역 -->
  <div style="margin-top:32px;">
    <div style="font-size:1.1rem;font-weight:800;color:#111;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--gray-200);">출고 내역</div>
    <div class="card">
      <div class="refresh-row">
        <div class="card-title" style="margin-bottom:0;">출고 내역 (최근 100건)</div>
        <button class="btn btn-outline" onclick="loadRecords()" style="padding:6px 12px;font-size:.8rem;">
          <i class="fas fa-rotate-right"></i> 새로고침
        </button>
      </div>
      <div class="table-wrap" style="max-height:640px;overflow-y:auto;">
        <table>
          <thead>
            <tr>
              <th style="position:sticky;top:0;background:#fff;z-index:1;">날짜</th>
              <th style="position:sticky;top:0;background:#fff;z-index:1;">대상</th>
              <th style="position:sticky;top:0;background:#fff;z-index:1;">교재명</th>
              <th style="position:sticky;top:0;background:#fff;z-index:1;">수량</th>
              <th style="position:sticky;top:0;background:#fff;z-index:1;">처리자</th>
            </tr>
          </thead>
          <tbody id="recordsBody">
            <tr><td colspan="5" style="text-align:center;padding:36px;color:var(--gray-600);">새로고침 버튼을 눌러주세요.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /bottomSection -->

</div><!-- /main-container -->



<!-- 처리 중 오버레이 -->
<div id="processingOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99999;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:16px;padding:40px 48px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <div style="margin-bottom:16px;"><span class="spinner" style="width:36px;height:36px;border-width:4px;"></span></div>
    <div style="font-size:1.1rem;font-weight:800;color:#111;">처리 중...</div>
    <div style="font-size:.85rem;color:var(--gray-500);margin-top:8px;">잠시만 기다려주세요</div>
  </div>
</div>

<!-- 중복 경고 모달 -->
<div id="duplicateOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:32px 28px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
    <div style="font-size:2rem;text-align:center;margin-bottom:12px;">⚠️</div>
    <h3 style="text-align:center;font-size:1.1rem;font-weight:800;color:#1a1a2e;margin-bottom:8px;">주의! 1주일 안에 같은 교재가 출고되었습니다.</h3>
    <div id="duplicateList" style="background:#fef3c7;border-radius:10px;padding:14px 16px;margin:16px 0;font-size:.82rem;color:#92400e;line-height:1.8;max-height:180px;overflow-y:auto;"></div>
    <div style="display:flex;gap:10px;">
      <button onclick="cancelDuplicate()" style="flex:1;padding:12px;background:#f3f4f6;color:#374151;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;">취소</button>
      <button onclick="proceedDuplicate()" style="flex:1;padding:12px;background:#ef4444;color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;">무시하고 진행</button>
    </div>
  </div>
</div>

<!-- 출고 확인 모달 -->
<div id="confirmModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:28px;width:90%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
    <div style="font-size:1rem;font-weight:800;color:#111;margin-bottom:16px;">출고 확인</div>
    <div id="confirmList" style="margin-bottom:20px;"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeConfirm()">취소</button>
      <button class="btn btn-primary" onclick="confirmCheckout()">출고 처리</button>
    </div>
  </div>
</div>

<!-- 지침 오류 모달 -->
<div id="guideErrorModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:28px;width:90%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
    <div style="font-size:1rem;font-weight:800;color:var(--danger);margin-bottom:16px;">⚠️ 지침오류</div>
    <div id="guideErrorList" style="margin-bottom:20px;font-size:.9rem;line-height:1.8;"></div>
    <div style="display:flex;justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeGuideError()">확인</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<!-- 로그인 오버레이 -->
<div id="loginOverlay" style="display:flex;position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4f8;z-index:9999;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:20px;padding:48px 40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.12);max-width:360px;width:90%;">
    <div style="width:72px;height:72px;background:#4F46E5;border-radius:18px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;">
      <span style="font-size:36px;">🎓</span>
    </div>
    <h1 style="font-size:1.5rem;font-weight:800;color:#1a1a2e;margin-bottom:8px;">IMPACT7</h1>
    <p style="font-size:.9rem;color:#6b7280;margin-bottom:32px;">학원 공식 계정(@impact7.kr) 필수</p>
    <button onclick="googleLogin()" style="width:100%;padding:14px;background:#1a1a2e;color:white;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;">
      <img src="https://www.google.com/favicon.ico" width="20" height="20">
      구글 계정으로 로그인하기
    </button>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxJsPJINJgwVOIeEYaK9EQtrNydRFETcneUkNhaKlTWc3p9HZ2DyFjLpUmMOc5_bPmDIg/exec';

let parsedItems   = [];
let inventoryData = [];
let currentFilter = 'all';

function callAPI(params) {
  if (params.text || params.items || params.processor) {
    return fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params)
    })
    .then(() => fetch(API_URL + '?action=preview&_=' + Date.now()))
    .then(r => r.json());
  }
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  return fetch(url, { method: 'GET' }).then(r => r.json());
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'input') loadInventory();
  if (tab === 'receiving') loadReceiving();
  // 출고 입력 탭일 때만 재고현황/출고내역 표시
  const bottomSection = document.getElementById('bottomSection');
  if (bottomSection) bottomSection.style.display = (tab === 'input') ? '' : 'none';
}


function searchStudent() {
  const name = document.getElementById('searchStudentName').value.trim();
  if (!name) {
    document.getElementById('searchResult').innerHTML = 
      '<div style="color:var(--gray-400);text-align:center;padding:24px;">학생 이름을 입력해주세요.</div>';
    return;
  }
  document.getElementById('searchResult').innerHTML = 
    '<div style="text-align:center;padding:24px;"><span class="spinner"></span> 검색 중...</div>';
  fetch(API_URL + '?action=getRecords')
    .then(r => r.json())
    .then(data => {
      const rows = (data.rows || []).filter(r => r['학생명'] && r['학생명'].includes(name));
      if (rows.length === 0) {

function saveReceiving() {
  const inputs = document.querySelectorAll('#receivingBody input[type=number]');
  const updates = [];
  inputs.forEach(input => {
    const idx = parseInt(input.dataset.idx);
    const col = input.dataset.col;
    const val = parseInt(input.value) || 0;
    let item = updates.find(u => u.idx === idx);
    if (!item) {
      item = { idx, bookName: receivingData[idx]['교재명'], type: receivingData[idx]['종류'] };
      updates.push(item);
    }
    item[col] = val;
  });
fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'updateInventory', updates })
  })

    .then(r => r.json())
    .then(data => {
      if (data.success) {
        showToast('✅ 재고가 저장되었습니다!', 'success');
        loadInventory();
      } else {
        showToast('❌ 저장 실패: ' + (data.error || ''), 'error');
      }
    })
    .catch(() => showToast('❌ 저장 중 오류 발생', 'error'));



}

function showToast(msg, type = '', duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => { t.className = ''; }, duration);
}

function doParse() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showToast('입력 내용이 없습니다.', 'error'); return; }
  showToast('분석 중...', '');
  const url = API_URL + '?action=preview&text=' + encodeURIComponent(text);
  fetch(url)
    .then(r => r.json())
    .then(onParseSuccess)
    .catch(err => showToast('오류: ' + err.message, 'error'));
}

function onParseSuccess(result) {
  parsedItems = result.results || [];
  const section = document.getElementById('previewSection');
  section.style.display = 'block';
  const wrap = document.getElementById('previewTableWrap');
  if (parsedItems.length > 0) {
    const campusBadge = { '양지5':'badge-blue', '양지10':'badge-green', '10단지':'badge-purple' };
    const catBadge    = { '어휘':'badge-blue', '영작':'badge-green', '숙어':'badge-yellow', '기타':'badge-gray' };
    let html = `<p style="font-size:.85rem;font-weight:700;margin-bottom:8px;color:var(--primary);">
      ✅ 인식된 항목 ${parsedItems.length}건</p>
      <div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>원본</th><th>반코드</th><th>캠퍼스</th>
        <th>학부</th><th>요일</th><th>학생명</th><th>교재명</th><th>분류</th>
      </tr></thead><tbody>`;
    parsedItems.forEach((item, i) => {
      html += `<tr>
        <td>${i+1}</td>
        <td><code>${item.raw}</code></td>
        <td><strong>${item.classCode}</strong></td>
        <td><span class="badge ${campusBadge[item.campus]||'badge-gray'}">${item.campus}</span></td>
        <td>${item.dept}</td>
        <td>${item.dayType}</td>
        <td><strong>${item.studentName}</strong></td>
        <td>${item.bookName}</td>
        <td><span class="badge ${catBadge[item.category]||'badge-gray'}">${item.category}</span></td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    wrap.innerHTML = html;
  } else {
    wrap.innerHTML = '';
  }
  const errDiv = document.getElementById('previewErrors');
  const errors = result.errors || [];
  if (errors.length > 0) {
    let eHtml = `<p style="font-size:.85rem;font-weight:700;margin-top:12px;margin-bottom:6px;color:var(--danger);">
      ❌ 인식 실패 ${errors.length}건</p>`;
    errors.forEach(e => {
      eHtml += `<div class="error-item"><strong>${e.line}</strong>${e.reason}</div>`;
    });
    errDiv.innerHTML = eHtml;
  } else {
    errDiv.innerHTML = '';
  }
  document.getElementById('checkoutBtn').disabled = false;
  if (parsedItems.length > 0)
    showToast(`${parsedItems.length}건 인식 완료! 출고 처리 버튼을 눌러주세요.`, 'success');
  else
    showToast('인식된 항목이 없습니다.', 'warning');
}

function doCheckout() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showToast('출고 목록을 입력하세요.', 'error'); return; }
  const url = API_URL + '?action=preview&text=' + encodeURIComponent(text);
  fetch(url)
    .then(r => r.json())
    .then(result => {
      parsedItems = result.results || [];
      const errors = result.errors || [];
      if (errors.length > 0) { showGuideError(errors); return; }
      if (parsedItems.length === 0) {
        showToast('인식된 항목이 없습니다. 입력 형식을 확인하세요.', 'warning');
        return;
      }
      showConfirm();
    })
    .catch(err => showToast('오류: ' + err.message, 'error'));
}

 else if (result.failList && result.failList.length > 0) {

function checkDuplicateAndCheckout(processor, checkedItems) {
  parsedItems = checkedItems;
  const oneWeekAgo = new Date();
  oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
  fetch(API_URL + '?action=getRecords')
    .then(r => r.json())
    .then(data => {
      const recentRows = (data.rows || []).filter(r => {
const d = new Date(r['날짜']);
return !isNaN(d) && d >= oneWeekAgo;

      });
      const duplicates = [];
      parsedItems.forEach(item => {
        recentRows.forEach(rec => {
         const recBook = (rec['교재명'] || '').replace(/\s/g,'').toLowerCase();
const itemBook = (item.bookName || '').replace(/\s/g,'').toLowerCase();
if (rec['학생명'] === item.studentName && recBook.includes(itemBook)) {

            duplicates.push({
              date: rec['날짜'],
              student: rec['학생명'],
              classCode: rec['반코드'],
              book: rec['교재명'],
              type: rec['종류'] || ''
            });
          }
        });
      });
      const uniqueDuplicates = duplicates.filter((d, i, arr) =>
        arr.findIndex(x => x.student === d.student && x.book === d.book && x.date === d.date) === i
      );
      if (uniqueDuplicates.length > 0) {
        const listHtml = uniqueDuplicates.map(d =>
          `• ${formatDate(d.date)} | ${d.classCode} ${d.student} | ${d.book} ${d.type ? '('+d.type+')' : ''}`
        ).join('<br>');
        document.getElementById('duplicateList').innerHTML = listHtml;
        document.getElementById('duplicateOverlay').style.display = 'flex';
        window._pendingProcessor = processor;
      } else {
        executeCheckout(processor);
      }
    })
    .catch(() => { executeCheckout(processor); });
}

function cancelDuplicate() {
  document.getElementById('duplicateOverlay').style.display = 'none';
  window._pendingProcessor = null;
  showToast('출고가 취소되었습니다.', 'warning');
}

function proceedDuplicate() {
  document.getElementById('duplicateOverlay').style.display = 'none';
  const processor = window._pendingProcessor || window._userId || '관리자';
  window._pendingProcessor = null;
  executeCheckout(processor);
}

function confirmCheckout() {
  const checkedItems = [];
  const checkboxes = document.querySelectorAll('#confirmList input[type=checkbox]');
  let checkIdx = 0;
  parsedItems.forEach((item) => {
    const isSingleCheck = item.bookType || (item.bookName || '').includes('써머리');
    if (isSingleCheck) {
      const cb = checkboxes[checkIdx];
      if (cb && cb.checked) {
const bookType = item.bookType || '';
        checkedItems.push({...item, bookType});

      }
      checkIdx += 1;
    } else {
      const tbCheck = checkboxes[checkIdx];
      const wbCheck = checkboxes[checkIdx + 1];
      if (tbCheck && tbCheck.checked) checkedItems.push({...item, bookType: 'TEXTBOOK'});
      if (wbCheck && wbCheck.checked) checkedItems.push({...item, bookType: 'WORKBOOK'});
      checkIdx += 2;
    }
  });

  closeConfirm();
  const processor = window._userId || '관리자';
  checkDuplicateAndCheckout(processor, checkedItems);
}

function loadInventory() {
  document.getElementById('inventoryBody').innerHTML =
    '<tr><td colspan="5" style="text-align:center;padding:36px;"><span class="spinner"></span> 로딩 중...</td></tr>';

    return;

  const groups = [];
  rows.forEach(r => {
    const last = groups[groups.length - 1];
    if (last && last.name === r['교재명']) last.items.push(r);
    else groups.push({ name: r['교재명'], items: [r] });

  let html = '';
  groups.forEach(g => {
    const count = g.items.length;
    if (count === 1) {
const r = g.items[0];
html += `<tr style="background:#fff;border-bottom:2px solid #e5e7eb;">
  <td style="text-align:left;vertical-align:middle;font-weight:700;padding-left:12px;background:#fff;width:35%;">${r['교재명']}</td>

<td style="text-align:center;padding-left:0;padding-right:0;background:#fff;${Number(r['양지5'])<=5?'color:#EF4444;font-weight:800;':''}">${r['양지5']}</td>

  <td style="text-align:center;padding-left:0;padding-right:0;background:#fff;${Number(r['양지10'])>0&&Number(r['양지10'])<=5?'color:#EF4444;font-weight:800;':''}">${Number(r['양지10'])===0?'':r['양지10']}</td>

<td style="text-align:center;padding-left:0;padding-right:0;background:#fff;${Number(r['10단지'])<=5?'color:#EF4444;font-weight:800;':''}">${r['10단지']}</td>

</tr>`;

    } else {
      g.items.forEach((r, i) => {
        const isLast = i === count - 1;
        const borderStyle = isLast ? 'border-bottom:2px solid #e5e7eb;' : '';
        html += `<tr style="background:#fff;">`;
        if (i === 0) {
          html += `<td rowspan="${count}" style="text-align:left;vertical-align:middle;font-weight:700;padding-left:12px;background:#fff;border-bottom:2px solid #e5e7eb;width:35%;">${r['교재명']}</td>
`;
        }
        html += `
          <td style="text-align:center;${borderStyle}background:#fff;"><span class="badge ${r['종류']==='TEXTBOOK'?'badge-blue':'badge-green'}">${r['종류']}</span></td>
<td style="text-align:center;${borderStyle}background:#fff;${Number(r['양지5'])<=5?'color:#EF4444;font-weight:800;':''}">${r['양지5']}</td>

<td style="text-align:center;${borderStyle}background:#fff;${Number(r['양지10'])>0&&Number(r['양지10'])<=5?'color:#EF4444;font-weight:800;':''}">${Number(r['양지10'])===0?'':r['양지10']}</td>


<td style="text-align:center;${borderStyle}background:#fff;${Number(r['10단지'])<=5?'color:#EF4444;font-weight:800;':''}">${r['10단지']}</td>


        </tr>`;
      });
    }
  });
  tbody.innerHTML = html;
}

function loadRecords() {
  document.getElementById('recordsBody').innerHTML =
    '<tr><td colspan="5" style="text-align:center;padding:36px;"><span class="spinner"></span> 로딩 중...</td></tr>';
  const recordsPromise = callAPI({ action: 'getRecords' });
  const inventoryPromise = inventoryData.length === 0
    ? callAPI({ action: 'getInventory' }).then(data => { inventoryData = data.rows || []; })
    : Promise.resolve();
  Promise.all([recordsPromise, inventoryPromise])
    .then(([recordsData]) => onRecordsLoaded(recordsData))
    .catch(err => showToast('내역 로드 오류: ' + err.message, 'error'));
}

function onRecordsLoaded(data) {
  if (data.error) { showToast(data.error, 'error'); return; }
  const tbody = document.getElementById('recordsBody');
  if (!data.rows || data.rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:36px;color:var(--gray-600);">출고 내역이 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = data.rows.map(r => `<tr>
    <td>${formatDate(r['날짜'])}</td>
    <td><strong>${r['반코드']}</strong> ${r['학생명']}</td>
    <td>${r['교재명']} <span style="font-size:.75rem;color:var(--gray-500);">${r['종류']||''}</span></td>
    <td>${r['수량']}</td>
    <td>${r['처리자']}</td>
  </tr>`).join('');
}

function getCurrentStock(bookName, campus) {
  if (!inventoryData || inventoryData.length === 0) return '-';
const norm = bookName.trim().replace(/\s/g, '').toLowerCase();

  const matched = inventoryData.find(r =>
r['교재명'].trim().replace(/\s/g, '').toLowerCase() === norm
&& r['종류'] === 'TEXTBOOK'
  ) || inventoryData.find(r =>
    r['교재명'].replace(/\s/g, '').toLowerCase() === norm
  );
  if (!matched) return '-';
  const stock = matched[campus];
  if (stock === undefined) return '-';
  const isLow = stock < matched['권장수량'];
  return `<span class="${isLow ? 'stock-num-low' : ''}">${stock}</span>`;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  return dateStr;
}

    callback: (response) => {
      if (response.access_token) {
        fetch('https://www.googleapis.com/oauth2/v3/userinfo', {

        })
        .then(r => r.json())

            alert('학원 공식 계정(@impact7.kr)으로 로그인해주세요!');
            return;
          }
          const userId = email.split('@')[0];
          localStorage.setItem('impact7_user', userId);
          window._userId = userId;
          document.getElementById('processorDisplay').textContent = userId;
          document.getElementById('loginOverlay').style.display = 'none';
        });
      }

  }).requestAccessToken();
}

function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const email = payload.email || '';
  if (!email.endsWith('@impact7.kr')) {
    alert('학원 공식 계정(@impact7.kr)으로 로그인해주세요!');
    return;
  }
  const userId = email.split('@')[0];
  localStorage.setItem('impact7_user', userId);
  window._userId = userId;
  document.getElementById('processorDisplay').textContent = userId;
  document.getElementById('loginOverlay').style.display = 'none';
}

window.addEventListener('DOMContentLoaded', () => {
  // 초기 bottomSection 표시 (출고 입력 탭이 기본)
  const bottomSection = document.getElementById('bottomSection');
  if (bottomSection) bottomSection.style.display = '';

  const saved = localStorage.getItem('impact7_user');
  if (saved) {
    window._userId = saved.split('@')[0];
    document.getElementById('processorDisplay').textContent = saved;
    document.getElementById('loginOverlay').style.display = 'none';
    loadInventory();
    loadRecords();
  } else {
    window.onGoogleLibraryLoad = function() {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleCredentialResponse,
        hosted_domain: 'impact7.kr'
      });
      google.accounts.id.prompt();
    };
    loadInventory();
    loadRecords();
  }
});
