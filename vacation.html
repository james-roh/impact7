<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Impact7 휴가현황</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', sans-serif; }
  .brand { background-color: #1f4e5f; }
  .brand-text { color: #1f4e5f; }
  .brand-light { background-color: #e8f0f2; }
  .brand-border { border-color: #1f4e5f; }
</style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- 🔒 로그인 화면 -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md border border-slate-100">
    <div class="text-center mb-8">
      <div class="w-14 h-14 brand rounded-xl flex items-center justify-center mx-auto mb-4">
        <i data-lucide="lock" class="text-white" width="26" height="26"></i>
      </div>
      <h1 class="text-xl font-bold text-slate-800">Impact7 휴가현황</h1>
      <p class="text-slate-400 text-sm mt-2">접근 비밀번호를 입력하세요</p>
    </div>
    <input type="password" id="pwInput" placeholder="비밀번호"
      class="w-full px-4 py-3 border border-slate-200 rounded-lg mb-3 focus:outline-none focus:border-slate-400 transition text-slate-700"
      onkeypress="if(event.key==='Enter') tryLogin()">
    <button onclick="tryLogin()"
      class="w-full brand hover:opacity-90 text-white py-3 rounded-lg font-semibold transition">
      접속하기
    </button>
    <p id="errorMsg" class="text-red-500 text-sm mt-3 text-center hidden">비밀번호가 일치하지 않습니다</p>
    <p id="loadingMsg" class="text-slate-500 text-sm mt-3 text-center hidden">데이터를 불러오는 중...</p>
  </div>
</div>

<!-- 📊 대시보드 -->
<div id="dashboard" class="hidden">
  <header class="brand text-white">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
     <div class="flex items-center gap-3">
  <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background: rgba(255,255,255,0.15);">
    <i data-lucide="calendar-check" class="text-white" width="20" height="20"></i>
  </div>
  <div>
    <span class="font-bold text-lg">Impact7</span>
    <span class="text-slate-200 text-sm ml-2">휴가현황</span>
  </div>
</div>

      <button onclick="logout()" class="text-slate-200 hover:text-white text-sm flex items-center gap-1">
        <i data-lucide="log-out" width="16" height="16"></i>
        로그아웃
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6">
    
    <!-- 전체 인원 + 연도 선택 -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-6 flex items-center justify-between flex-wrap gap-4">
      <div class="flex items-center gap-4">
        <div class="brand-light w-12 h-12 rounded-lg flex items-center justify-center">
          <i data-lucide="users" class="brand-text" width="24" height="24"></i>
        </div>
        <div>
          <p class="text-slate-500 text-sm">전체 인원</p>
          <p class="text-2xl font-bold text-slate-800 mt-1"><span id="total">-</span><span class="text-base font-normal text-slate-400 ml-1">명</span></p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <select id="yearSelect" 
          class="px-3 py-2 border border-slate-200 rounded-lg text-slate-700 text-sm focus:outline-none focus:border-slate-400 bg-white">
        </select>
        <button onclick="loadYear()" 
          class="brand hover:opacity-90 text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1.5">
          <i data-lucide="refresh-cw" width="14" height="14"></i>
          휴가 불러오기
        </button>
      </div>
    </div>

    <!-- 안내 메시지 영역 -->
    <div id="notice" class="hidden bg-amber-50 border border-amber-200 text-amber-800 px-4 py-3 rounded-lg mb-4 text-sm"></div>

    <!-- 막대 차트 -->
    <div class="mb-3 flex items-center gap-2">
      <div class="w-1 h-5 brand rounded-sm"></div>
      <h2 class="text-slate-800 font-semibold">직원별 휴가 현황 <span id="yearLabel" class="text-slate-400 text-sm font-normal"></span></h2>
    </div>
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8">
      <canvas id="chart" height="100"></canvas>
    </div>

    <!-- 직원 카드 -->
    <div class="mb-3 flex items-center gap-2">
      <div class="w-1 h-5 brand rounded-sm"></div>
      <h2 class="text-slate-800 font-semibold">직원별 상세 내역</h2>
    </div>
    <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>

    <p class="text-center text-slate-400 text-xs mt-8 pb-4">© Impact7 Vacation Dashboard</p>
  </main>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz7OYwz23qibeNcsiG1ALJtyqu8he0f720PtfMxn1-L2md_IMrc8j3ETL5DlzXshOc/exec';

let chartInstance = null;

async function autoLogin() {
  try {
    const res = await fetch(`${API_URL}?action=list`);
    const result = await res.json();
    
    if (result.error) {
      showNotice('접근 권한이 없습니다');
      return;
    }
    
    const select = document.getElementById('yearSelect');
    const years = result.years || [];
    if (years.length === 0) {
      showNotice('사용 가능한 연도가 없습니다');
      return;
    }
    
    years.sort().reverse();
    select.innerHTML = years.map(y => `<option value="${y}">${y}년</option>`).join('');
    
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    
    loadYear();
    lucide.createIcons();
    
  } catch (err) {
    alert('연결 오류가 발생했습니다');
  }
}

window.addEventListener('DOMContentLoaded', autoLogin);


async function loadYear() {
  const year = document.getElementById('yearSelect').value;
  const notice = document.getElementById('notice');
  notice.classList.add('hidden');
  
  try {
      const res = await fetch(`${API_URL}?year=${year}`);
    const data = await res.json();
    
    document.getElementById('yearLabel').textContent = `(${year}년)`;
    
    // 에러 처리
    if (data.error) {
      showNotice(data.message || '데이터를 불러올 수 없습니다');
      renderEmpty();
      return;
    }
    
    // 빈 데이터 처리
    if (!Array.isArray(data) || data.length === 0) {
      showNotice(`${year}년 시트에 등록된 데이터가 없습니다`);
      renderEmpty();
      return;
    }
    
    renderDashboard(data);
    lucide.createIcons();
    
  } catch (err) {
    showNotice('연결 오류가 발생했습니다');
  }
}

function showNotice(msg) {
  const notice = document.getElementById('notice');
  notice.textContent = '⚠ ' + msg;
  notice.classList.remove('hidden');
}

function renderEmpty() {
  document.getElementById('total').textContent = '0';
  document.getElementById('cardGrid').innerHTML = '';
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
}

function renderDashboard(data) {
  document.getElementById('total').textContent = data.length;

  // 차트
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
      labels: data.map(p => p.id),
      datasets: [
       { label: '사용', data: data.map(p => p.used), backgroundColor: '#e2e8f0', borderRadius: 4 },
{ label: '잔여', data: data.map(p => p.remaining), backgroundColor: '#1f4e5f', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top', labels: { font: { size: 12 }, usePointStyle: true, pointStyle: 'circle' } } },
      scales: {
        x: { stacked: true, grid: { display: false }, ticks: { font: { weight: 'bold', size: 11 } } },
        y: { stacked: true, beginAtZero: true, grid: { color: '#f1f5f9' } }
      }
    }
  });

  // 카드
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = data.map(p => {
    const total = Number(p.used) + Number(p.remaining);
    const pct = total ? Math.round(p.remaining / total * 100) : 0;
    const initial = (p.id || '?').charAt(0);
    return `
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-3">
            <div class="brand w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm">${initial}</div>
            <div>
              <p class="font-bold text-slate-800 tracking-wide">${p.id}</p>
              <p class="text-slate-400 text-xs">잔여 ${p.remaining}일 / 사용 ${p.used}일</p>
            </div>
          </div>
          <div class="text-right">
            <p class="brand-text font-bold text-lg">${p.remaining}</p>
            <p class="text-slate-400 text-xs">일 남음</p>
          </div>
        </div>
        <div class="bg-slate-100 rounded-full h-1.5 overflow-hidden">
          <div class="brand h-full transition-all" style="width:${pct}%"></div>
        </div>
      </div>`;
  }).join('');
}

function logout() { location.reload(); }

lucide.createIcons();
</script>

</body>
</html>
