<style>
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: #f1f5f9; }

.count-table input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.count-table td.disabled{background:#f5f5f5;color:#bbb}
.count-table .total-row th{background:#1f4e5f;color:white}
.count-table .total-row td{background:#e8f0f3;font-weight:700;color:#1f4e5f;font-size:15px}

<div class="mb-6" style="padding-left:20px">

    <h2 class="text-slate-700 font-semibold mb-3 flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1f4e5f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>인원 통계</h2>

      <canvas id="classChart" style="max-height: 400px;"></canvas>

  <!-- 학부별 인원 -->
<div class="mt-6" style="padding-left:20px">

    <h2 class="text-slate-700 font-semibold mb-3 flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1f4e5f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>학부별 인원</h2>

<script>

const API_URL = 'https://script.google.com/macros/s/AKfycbyISQnGJqoW71qciw56UbA1ZBT-LtOS4NMCTD2h2rRmWAp9VE1ii4moEAHcSV70NYAjbA/exec';
let campusMap = {};
let currentCampus = '양지5';
let chartInstance = null;

// 통합 표용 — 각 지점별로 현재 선택된 시트
const summarySheets = { '양지5': '', '양지10': '', '10단지': '' };
const STAT_LABELS = ['현인원','실인원','입학대기','가배정','실휴원','가휴원','총휴원'];

async function loadCampusList() {
  try {
    const res = await fetch(API_URL);
    const result = await res.json();
    if (!result.success) { alert('데이터를 불러올 수 없습니다: ' + (result.error || '알 수 없음')); return; }
    campusMap = result.campuses;

    renderSheetSelect();
    renderSummaryTable();
    loadSummaryAll();
    loadSheetData();
  } catch (err) {
    alert('loadCampusList 에러: ' + err.message);
  }
}


function renderSheetSelect() {
  const sel = document.getElementById('sheetSelect');
  const sheets = campusMap[currentCampus] || [];
  sel.innerHTML = sheets.map(s => `<option value="${s}">${s}</option>`).join('');
}
function renderSummaryTable() {
  const tbody = document.getElementById('summaryTableBody');
  const campuses = ['양지5','양지10','10단지'];

  // 각 지점 첫 번째 시트를 기본값으로
  campuses.forEach(c => {
    if (!summarySheets[c]) {
      const list = campusMap[c] || [];
      if (list.length) summarySheets[c] = list[0];
    }
  });

  // 시트 행
  let html = `<tr>
    <th>시트tjsxor</th>
    ${campuses.map(c => `
      <td>
        <select class="summary-sheet-select" data-campus="${c}">
          ${(campusMap[c] || []).map(s => `
            <option value="${s}" ${s === summarySheets[c] ? 'selected' : ''}>${s}</option>
          `).join('')}
        </select>
      </td>
    `).join('')}
  </tr>`;

  // 통계 행 (현인원, 실인원, …)
  STAT_LABELS.forEach(label => {
    html += `<tr>
      <th>${label}</th>
      ${campuses.map(c => `<td data-campus="${c}" data-stat="${label}">-</td>`).join('')}
    </tr>`;
  });

  tbody.innerHTML = html;

  // 드롭다운 이벤트
  tbody.querySelectorAll('.summary-sheet-select').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const c = e.target.dataset.campus;
      summarySheets[c] = e.target.value;
      loadSummaryCampus(c);
    });
  });
}

async function loadSheetData() {
  const sheetName = document.getElementById('sheetSelect').value;
  if (!sheetName) return;
  document.getElementById('loading').classList.remove('hidden');
  try {
    const res = await fetch(API_URL + '?sheet=' + encodeURIComponent(sheetName));
    const result = await res.json();
    if (!result.success) { alert('시트 로드 실패: ' + result.error); return; }
    renderStats(result.data.stats);
    renderClasses(result.data.classes);
  } catch (err) {
    alert('연결 오류: ' + err.message);
  } finally {
    document.getElementById('loading').classList.add('hidden');
  }
}

/* =======================
   통합 인원 표 로직
   ======================= */
function renderSummaryTable() {
  const tbody = document.getElementById('summaryTableBody');
  const campuses = ['양지5','양지10','10단지'];

  // 각 지점 첫 번째 시트를 기본값으로
  campuses.forEach(c => {
    if (!summarySheets[c]) {
      const list = campusMap[c] || [];
      if (list.length) summarySheets[c] = list[0];
    }
  });

   // 시트 행
  let html = `<tr>
    <th>시트선택</th>
    ${campuses.map(c => `
      <td>
        <select class="summary-sheet-select" data-campus="${c}">
          ${(campusMap[c] || []).map(s => `
            <option value="${s}" ${s === summarySheets[c] ? 'selected' : ''}>${s}</option>
          `).join('')}
        </select>
      </td>
    `).join('')}
  </tr>`;

  // 통계 행 (현인원, 실인원, …)
  STAT_LABELS.forEach(label => {
    html += `<tr>
      <th>${label}</th>
      ${campuses.map(c => `<td data-campus="${c}" data-stat="${label}">-</td>`).join('')}
    </tr>`;
  });


  tbody.innerHTML = html;

  // 드롭다운 이벤트
  tbody.querySelectorAll('.summary-sheet-select').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const c = e.target.dataset.campus;
      summarySheets[c] = e.target.value;
      loadSummaryCampus(c);
    });
  });
}

async function loadSummaryAll() {
  document.getElementById('summaryLoading').classList.remove('hidden');
  try {
    await Promise.all(['양지5','양지10','10단지'].map(c => loadSummaryCampus(c, true)));
    updateSummaryTotals();
  } finally {
    document.getElementById('summaryLoading').classList.add('hidden');
  }
}

async function loadSummaryCampus(campus, skipTotalUpdate) {
  const sheet = summarySheets[campus];
  const tbody = document.getElementById('summaryTableBody');

  if (!sheet) {
    STAT_LABELS.forEach(l => {
      const cell = tbody.querySelector(`td[data-campus="${campus}"][data-stat="${l}"]`);
      if (cell) cell.textContent = '-';
    });
    if (!skipTotalUpdate) updateSummaryTotals();
    return;
  }

  // 로딩 표시
  STAT_LABELS.forEach(l => {
    const cell = tbody.querySelector(`td[data-campus="${campus}"][data-stat="${l}"]`);
    if (cell) cell.textContent = '...';
  });

  try {
    const res = await fetch(API_URL + '?sheet=' + encodeURIComponent(sheet));
    const result = await res.json();
    if (!result.success) throw new Error(result.error);
    const stats = result.data.stats || {};
    STAT_LABELS.forEach(l => {
      const cell = tbody.querySelector(`td[data-campus="${campus}"][data-stat="${l}"]`);
      if (cell) cell.textContent = (stats[l] ?? 0);
    });
  } catch (err) {
    STAT_LABELS.forEach(l => {
      const cell = tbody.querySelector(`td[data-campus="${campus}"][data-stat="${l}"]`);
      if (cell) cell.textContent = 'X';
    });
    console.error('통합 표 로드 실패 ('+campus+'):', err);
  }
  if (!skipTotalUpdate) updateSummaryTotals();
}

function updateSummaryTotals() {
  // 전체 합산 열 제거됨 — 동작 없음
}


/* =======================
   기존 통계 카드 / 차트 / 표
   ======================= */
function renderStats(stats) {
  const labels = ['현인원','실인원','입학대기','가배정','실휴원','가휴원','총휴원'];
  const colors = ['#1f4e5f','#0e7490','#ca8a04','#9333ea','#dc2626','#ea580c','#be123c'];
  const container = document.getElementById('statsContainer');
  container.innerHTML = labels.map((label, i) => `
    <div class="card stat-card" style="border-top: 3px solid ${colors[i]};">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${stats[label] ?? '-'}</div>
    </div>
  `).join('');
}

function renderClasses(classes) {
  const map = {};
  classes.forEach(c => {
    const cnt = Number(c.count) || 0;
    if (!map[c.name] || cnt > map[c.name].count) {
      map[c.name] = { name: c.name, count: cnt, block: c.block };
    }
  });

  function getDept(name) {
    const n = (name || '').toUpperCase().trim();
    if (n.startsWith('HA') || n.startsWith('HX') || n.startsWith('HS')) return '고등부';
    if (n.startsWith('AX') || n.startsWith('EX') || n.startsWith('SP')) return '중등부';
    if (n.startsWith('I') || n.startsWith('A')) return '중등부';
    if (n.startsWith('P')) return '초등부';
    if (n.startsWith('K')) return '정시반';
    return '기타';
  }

  const order = { '초등부': 1, '중등부': 2, '고등부': 3, '정시반': 4, '기타': 5 };

  function getPrefixOrder(name) {
    const n = (name || '').toUpperCase().trim();
    if (n.startsWith('PI')) return 1;
    if (n.startsWith('PA')) return 2;
    if (n.startsWith('PX')) return 3;
    if (n.startsWith('AX')) return 6;
    if (n.startsWith('EX')) return 7;
    if (n.startsWith('SP')) return 8;
    if (n.startsWith('HA')) return 9;
    if (n.startsWith('HX')) return 10;
    if (n.startsWith('HS')) return 11;
    if (n.startsWith('I')) return 4;
    if (n.startsWith('A')) return 5;
    if (n.startsWith('K')) return 12;
    return 999;
  }

  const filtered = Object.values(map)
    .filter(c => c.count > 0)
    .map(c => ({ ...c, dept: getDept(c.name) }))
    .sort((a, b) => {
      if (order[a.dept] !== order[b.dept]) return order[a.dept] - order[b.dept];
      const pa = getPrefixOrder(a.name);
      const pb = getPrefixOrder(b.name);
      if (pa !== pb) return pa - pb;
      return a.name.localeCompare(b.name);
    });

  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('classChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: filtered.map(c => c.name),
      datasets: [{
        label: '현인원',
        data: filtered.map(c => c.count),
        backgroundColor: '#1f4e5f'
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
    }
  });

  const total = filtered.reduce((sum, c) => sum + c.count, 0);
  const deptColor = { '초등부': '#1f4e5f', '중등부': '#1f4e5f', '고등부': '#1f4e5f', '정시반': '#1f4e5f' };

  const groups = {};
  filtered.forEach(c => {
    if (!groups[c.dept]) groups[c.dept] = [];
    groups[c.dept].push(c);
  });

  const groupOrder = ['초등부','중등부','고등부','정시반','기타'];

  const groupsHTML = groupOrder.filter(d => groups[d]).map(dept => {
    const color = deptColor[dept] || '#64748b';
    const items = groups[dept];
    const sum = items.reduce((s,c) => s + c.count, 0);
    return `
      <div class="mb-6">
        <div class="text-white text-center font-bold py-2 rounded-t-lg" style="background:${color};">
          ${dept} <span class="ml-2 font-normal opacity-90">(${sum}명)</span>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 p-4 bg-slate-50 rounded-b-lg">

function populateRangeSelectors(data) {
  const fromSel = document.getElementById('dashRangeFrom');

  const options = data.map(d => {
    const label = d['연도'] + '.' + d['월'];
    return '<option value="' + label + '">' + label + '</option>';
  }).join('');
  fromSel.innerHTML = options;
  toSel.innerHTML = options;
  fromSel.value = data[0]['연도'] + '.' + data[0]['월'];
  toSel.value = data[data.length-1]['연도'] + '.' + data[data.length-1]['월'];
  fromSel.onchange = applyRangeFilter;
  toSel.onchange = applyRangeFilter;
}

function applyRangeFilter() {
  const from = document.getElementById('dashRangeFrom').value;
  const to = document.getElementById('dashRangeTo').value;
  const labels = allData.map(d => d['연도'] + '.' + d['월']);
  let fromIdx = labels.indexOf(from);
  let toIdx = labels.indexOf(to);
  if (fromIdx === -1) fromIdx = 0;
  if (toIdx === -1) toIdx = labels.length - 1;
  if (fromIdx > toIdx) { const t = fromIdx; fromIdx = toIdx; toIdx = t; }
  const filtered = allData.slice(fromIdx, toIdx + 1);
  drawGradeChart(filtered);
}

function initYearMonthSelectors() {
  const yearSel = document.getElementById('admin-year');
  const monthSel = document.getElementById('admin-month');
  const now = new Date();
  
  if (yearSel.options.length === 0) {
    for (let y = now.getFullYear() - 2; y <= now.getFullYear() + 1; y++) {
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = y + '년';
      yearSel.appendChild(opt);
    }
    for (let m = 1; m <= 12; m++) {
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = m + '월';
      monthSel.appendChild(opt);
    }
  }
  yearSel.value = now.getFullYear();
  monthSel.value = now.getMonth() + 1;
}

function updateSums() {
  let sumE = 0, sumM = 0, sumH = 0;
  ['e4','e5','e6'].forEach(k => { sumE += +document.getElementById('c-' + k).value || 0; });
  ['m1','m2','m3'].forEach(k => { sumM += +document.getElementById('c-' + k).value || 0; });
  ['h1','h2','h3'].forEach(k => { sumH += +document.getElementById('c-' + k).value || 0; });
  document.getElementById('sum-e').textContent = sumE;
  document.getElementById('sum-m').textContent = sumM;

}

  }
});


async function saveAdminCounts() {
  const params = new URLSearchParams(window.location.search);
  const userEmail = (params.get('user') || 'roh@impact7.kr').toLowerCase();
  const year = document.getElementById('admin-year').value;
  const month = document.getElementById('admin-month').value;
  const msgEl = document.getElementById('upload-msg');
  const btn = document.getElementById('btn-save');
  
   const counts = {
    e1: 0,
    e2: 0,
    e3: 0,
    e4: +document.getElementById('c-e4').value || 0,
    e5: +document.getElementById('c-e5').value || 0,
    e6: +document.getElementById('c-e6').value || 0,
    m1: +document.getElementById('c-m1').value || 0,
    m2: +document.getElementById('c-m2').value || 0,
    m3: +document.getElementById('c-m3').value || 0,
    h1: +document.getElementById('c-h1').value || 0,
    h2: +document.getElementById('c-h2').value || 0,
    h3: +document.getElementById('c-h3').value || 0
  };

  
  btn.disabled = true;
  btn.textContent = '저장 중...';
  msgEl.textContent = '구글 시트에 저장 중...';
  msgEl.className = 'upload-msg';
  
  try {
    const res = await fetch(UPLOAD_API_URL, {
      method: 'POST',
      body: JSON.stringify({
        email: userEmail,
        year: year,
        month: month,
        counts: counts
      })
    });
    const result = await res.json();
    
    if (result.success) {
      msgEl.textContent = '✅ ' + result.yearMonth + ' ' + result.action + ' 완료';
      msgEl.className = 'upload-msg success';
      setTimeout(function() { closeAdminPanel(); }, 2000);
    } else {
      msgEl.textContent = '❌ 오류: ' + result.error;
      msgEl.className = 'upload-msg error';
      btn.disabled = false;
      btn.textContent = '저장';
    }
  } catch (err) {
    msgEl.textContent = '❌ 연결 오류: ' + err.message;
    msgEl.className = 'upload-msg error';
    btn.disabled = false;
    btn.textContent = '저장';
  }
}
