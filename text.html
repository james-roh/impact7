const schoolCodeMap = {
    elem: ['PI', 'PA', 'PX'],
    mid:  ['I', 'A', 'AX', 'EX', 'SP'],
    high: ['HA', 'HX', 'HS']
};

function parseGuidelineRules() {
    const raw = localStorage.getItem('guideline_class') || '';
    const rules = {};
    const campusTextMap = {
        '양지5층':  'yangji5',
        '양지10층': 'yangji10',
        '10단지':   'danji10'
    };
    const elemMidCodes = ['PI','PA','PX','I','A','AX','EX','SP'];
    const lines = raw.split('\n');
    let currentCode = null;
    let isElemMid = false;
    let bookLines = [];

    const saveCurrentSection = () => {
        if (bookLines.length === 0) return;
        const bookText = bookLines.join('\n').trim();
        if (isElemMid) {
            // 초등/중등 전체 코드에 동일 교재 적용
            elemMidCodes.forEach(c => {
                rules[c] = rules[c] || {};
                rules[c].bookText = bookText;
                rules[c].bookPrice = calcBookPrice(bookText);
            });
        } else if (currentCode) {
            rules[currentCode] = rules[currentCode] || {};
            rules[currentCode].bookText = bookText;
            rules[currentCode].bookPrice = calcBookPrice(bookText);
        }
    };

    lines.forEach(line => {
        const trimmed = line.trim();

        // "코드 = 학부, 요일, 캠퍼스" 형식 (KS131 등)
        const ruleMatch = trimmed.match(/^([A-Za-z0-9]+)\s*=\s*(.+)$/);
        if (ruleMatch) {
            saveCurrentSection();
            currentCode = null; isElemMid = false; bookLines = [];
            const code  = ruleMatch[1].trim().toUpperCase();
            const parts = ruleMatch[2].split(',').map(s => s.trim());
            rules[code] = rules[code] || {};
            rules[code].days   = parts[1] || null;
            rules[code].campus = campusTextMap[parts[2]] || null;
            return;
        }

        // "초등/중등" 섹션
        if (trimmed === '초등/중등' || trimmed === '초등' || trimmed === '중등') {
            saveCurrentSection();
            currentCode = null; isElemMid = true; bookLines = [];
            return;
        }

        // "고등" 단독 줄 무시
        if (trimmed === '고등') {
            saveCurrentSection();
            currentCode = null; isElemMid = false; bookLines = [];
            return;
        }


        // "HA", "HX", "HS" 등 코드 단독 줄
        const codeOnly = trimmed.match(/^([A-Z]{1,3})$/);
        if (codeOnly) {
            saveCurrentSection();
            currentCode = codeOnly[1].toUpperCase();
            isElemMid = false; bookLines = [];
            rules[currentCode] = rules[currentCode] || {};
            return;
        }

                // 교재 내용 줄 수집
        if ((currentCode || isElemMid) && trimmed !== '') {
            bookLines.push(trimmed);
        }

    });

    saveCurrentSection();
    return rules;
}

function calcBookPrice(bookText) {
    let total = 0;
    const priceMatches = bookText.match(/[\d,]+원/g) || [];
    priceMatches.forEach(p => {
        total += parseInt(p.replace(/[,원]/g, '')) || 0;
    });
    return total;
}


function parseClassInfo(rawClassName) {
    const className = rawClassName.split('/')[0].trim().toUpperCase();

    // KS131, KS132 특수 처리
    if (className === 'KS131') {
        return {
            school: 'ks',
            campusKey: 'yangji10',
            lessonDays: '수',
            code: 'KS131'
        };
    }
    if (className === 'KS132') {
        return {
            school: 'ks',
            campusKey: 'yangji10',
            lessonDays: '토',
            code: 'KS132'
        };
    }

    const codeMatch = className.match(/^([A-Z]+)(\d{3})/);


    if (!codeMatch) return null;

    const code        = codeMatch[1];
    const digits      = codeMatch[2];
    const campusDigit = digits[0];
    const dayDigit    = digits[2];

    let school = null;
    for (const [key, codes] of Object.entries(schoolCodeMap)) {
        if (codes.includes(code)) { school = key; break; }
    }
    if (!school) return null;

const guidelineRules = parseGuidelineRules();
const fullMatch = guidelineRules[className] || null;
const codeMatch2 = guidelineRules[code] || null;
const ruleToUse = fullMatch || codeMatch2;

let campusKey = ruleToUse?.campus || null;
if (!campusKey) {
    if (campusDigit === '1') campusKey = (school === 'high') ? 'yangji10' : 'yangji5';
    else if (campusDigit === '2') campusKey = 'danji10';
    else campusKey = 'yangji5';
}

let lessonDays = ruleToUse?.days || null;
if (!lessonDays) {
    const dayNum = parseInt(dayDigit);
    if (dayNum % 2 === 1) lessonDays = '월금';
    else if (dayNum % 2 === 0) lessonDays = '화목';
    else lessonDays = '';
}


    return { school, campusKey, lessonDays, code };
}

function handleClassNameInput() {
    const rawClassName = document.getElementById('classNameInput').value || "";
    const classInfo = parseClassInfo(rawClassName);
    if (classInfo) {
        const timeKey = classInfo.code === 'KS131' ? 'ks131' :
                        classInfo.code === 'KS132' ? 'ks132' : classInfo.school;
        updateAttendanceTimeOptions(timeKey);
        const tuitionKey = (classInfo.code === 'KS131' || classInfo.code === 'KS132') ? 'ks' : classInfo.school;

    function calculateOtTime(school, timeStr) {
        if (!timeStr || timeStr.trim() === "") return "[시간 선택 필요]";
        try {
            const parts = timeStr.split(':');
            if (parts.length !== 2) return timeStr;
            let hour = parseInt(parts[0]);
            let min  = parseInt(parts[1]);
            if (isNaN(hour) || isNaN(min)) return timeStr;
            const minusMinutes = (school === 'high') ? 10 : 20;
            min -= minusMinutes;
            if (min < 0) { min += 60; hour -= 1; if (hour < 0) hour += 24; }
            const paddedMin = String(min).padStart(2, '0');
            const otDuration = (school === 'high') ? 10 : 20;
            return `${hour}:${paddedMin}~ (OT ${otDuration}분 소요)`;
        } catch (e) { return timeStr; }
    }

    function executeTextCopySystem() {
        const textToCopy = document.getElementById('smsTextPreviewArea').innerText;
        if (!textToCopy || textToCopy.includes("[학부 및 반명 선택 필요]")) {

            return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("📋 입학 안내문 전송 텍스트가 클립보드에 복사되었습니다!");
            }).catch(() => fallbackCopyTextProcess(textToCopy));
        } else {
            fallbackCopyTextProcess(textToCopy);
        }
    }

    function fallbackCopyTextProcess(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            alert("📋 입학 안내문 전송 텍스트가 클립보드에 복사되었습니다!");
        } catch (err) {
            alert("⚠️ 복사에 실패했습니다. 미리보기 내용을 직접 드래그하여 복사해주세요.");
        }
        document.body.removeChild(textArea);
    }
