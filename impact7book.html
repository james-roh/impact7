<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>임팩트7 교재 안내 (봄2 · 26년 5~7월)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f5f6fa; color: #333; }
  h1 { text-align: left; padding: 28px 0 8px 16px; font-size: 1.8rem; color: #1a1a2e; }
  .subtitle { text-align: left; color: #888; font-size: 0.9rem; margin-bottom: 24px; padding-left: 16px; }
  .section { max-width: 1100px; margin: 0 0 40px 0; padding: 0 16px; }
  .section-title {
    font-size: 1.1rem; font-weight: 700; color: #fff;
    background: #2d6a4f; padding: 10px 18px; border-radius: 8px 8px 0 0;
  }
  .section-title.mid  { background: #2d6a4f; }
  .section-title.high { background: #2d6a4f; }
  table { width: 100%; border-collapse: collapse; background: #fff;
          border-radius: 0 0 8px 8px; overflow: hidden;
          box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  th { background: #f0f4f8; padding: 10px 8px; font-size: 0.82rem;
       text-align: center; border-bottom: 2px solid #dde; color: #555; }
  td { padding: 4px 8px; text-align: center; border-bottom: 1px solid #eef;
       vertical-align: middle; font-size: 0.82rem; height: 36px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8faff; }
  .book-cover {
    width: 60px; height: 84px; object-fit: cover;
    border-radius: 4px; box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    display: block; margin: 0 auto 6px;
  }
  .book-cell { text-align: center; padding: 4px; }
  .book-title { font-size: 0.75rem; font-weight: 600; margin-bottom: 2px; line-height: 1.3; }
  .book-pub { font-size: 0.65rem; color: #888; }
  .no-book { color: #ccc; font-size: 0.75rem; }
  #settingsToggle {
    background: transparent; color: #333; font-size: 1rem;
    padding: 10px 20px; border-radius: 8px; cursor: pointer;
    border: 1px solid #999; margin-top: 16px;
  }
  .settings-section { margin-bottom: 16px; }
  .settings-section-title {
    font-size: 0.85rem; font-weight: 700; color: #2d5a8e;
    background: #eef3fa; padding: 6px 10px;
    border-radius: 6px; margin-bottom: 8px;
  }
  .settings-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .settings-row label { font-size: 0.75rem; min-width: 110px; color: #444; line-height: 1.3; }
  .settings-row input {
    flex: 1; font-size: 0.72rem; padding: 5px 8px;
    border: 1px solid #ddd; border-radius: 4px; color: #333;
  }
  .settings-row input:focus { outline: none; border-color: #2d5a8e; }
  .img-preview {
    width: 32px; height: 44px; object-fit: cover;
    border-radius: 3px; border: 1px solid #eee;
    cursor: pointer; flex-shrink: 0;
  }
  #saveSettingsBtn {
    width: 100%; padding: 10px; background: #2d5a8e;
    color: white; border: none; border-radius: 6px;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    margin-top: 8px; margin-bottom: 8px;
  }
  #saveSettingsBtn:hover { background: #1a3d63; }
  #resetSettingsBtn {
    width: 100%; padding: 8px; background: #f5f5f5;
    color: #888; border: 1px solid #ddd;
    border-radius: 6px; font-size: 0.85rem; cursor: pointer;
  }
  #resetSettingsBtn:hover { background: #ffe5e5; color: #c00; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div id="sidebarContainer"></div>
<script src="sidebar.js"></script>

<div style="margin-left: 2px; padding: 20px 0;">
<div style="padding: 0 16px 24px;">
  <div style="display:flex; align-items:baseline; gap:12px;">
    <h1 style="padding:28px 0 8px 0;">임팩트7 교재 안내</h1>
    <select id="semesterSelect" onchange="saveSemester()" style="padding:4px 10px; border-radius:6px; border:1px solid #999; font-size:0.85rem; background:rgba(255,255,255,0.6); color:#1a1a1a; font-weight:600; cursor:pointer;">
      <option value="봄2">봄학기</option>
    </select>
  </div>
</div>

<div id="app"></div>

<div id="settingsPanel" style="display:none; max-width:1100px; margin:16px 0;">
  <div style="background:#2d5a8e; color:white; padding:14px 16px; border-radius:8px 8px 0 0; font-weight:600;">
    교재 설정
  </div>
  <div style="background:#fff; padding:16px; border:1px solid #ddd; border-radius:0 0 8px 8px;">
    <div id="settingsForm"></div>
    <button id="saveSettingsBtn" onclick="saveImageSettings()">저장 (JSON)</button>
    <button id="resetSettingsBtn" onclick="resetImageSettings()">초기화</button>
  </div>
</div>

<script>
// ========== 설정 ==========
const SHEET_ID  = '1d2nuMH7AvA5NB7kLdwK0EQglpVdS07-Uqo6bOWUYcJE';
const SHEET_GID = '37076610';
const JSON_URL  = 'https://raw.githubusercontent.com/impact7/bookdata/main/bookImages.json';

// ========== 교재 구조 ==========
let bookData = {
  elem: { title: "초등반", rows: [
    { class: "PX", 독해: {}, 문법: {}, 실전: {}, 청해: {} },
    { class: "PA", 독해: {}, 문법: {}, 실전: {}, 청해: {} },
    { class: "PI", 독해: {}, 문법: {}, 실전: {}, 청해: {} }
  ]},
  mid: { title: "중등반", rows: [
    { class: "SP", 독해: {}, 문법: {}, 실전: {}, 청해: {} },
    { class: "EX", 독해: {}, 문법: {}, 실전: {}, 청해: {} },
    { class: "AX", 독해: {}, 문법: {}, 실전: {}, 청해: {} },
    { class: "A",  독해: {}, 문법: {}, 실전: {}, 청해: {} },
    { class: "I",  독해: {}, 문법: {}, 실전: {}, 청해: {} }
  ]},
  high: { title: "고등반", rows: [
    { class: "HS", 독해: {}, 문법: {}, 실전: {} },
    { class: "HX", 독해: {}, 문법: {}, 실전: {} },
    { class: "HA", 독해: {}, 문법: {}, 실전: {} }
  ]}
};

// ========== 저장 데이터 (교재명/출판사/이미지 모두) ==========
let savedData = {};

// ========== GitHub JSON 로드 ==========
async function loadJsonData() {
  try {
    const res = await fetch(JSON_URL + '?t=' + Date.now());
    if (res.ok) {
      savedData = await res.json();
      console.log('✅ bookImages.json 로드 완료');
      return true;
    }
  } catch(e) {
    console.log('bookImages.json 없음, 구글 시트에서 로드');
  }
  return false;
}

// ========== 구글 시트 로드 (최초 1회) ==========
async function loadSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));
  return json.table.rows.map(row =>
    row.c ? row.c.map(cell => (cell && cell.v !== null ? String(cell.v).trim() : '')) : []
  );
}

function getCell(rows, rowIdx, colIdx) {
  return (rows[rowIdx] && rows[rowIdx][colIdx]) ? rows[rowIdx][colIdx] : '';
}

async function loadFromSheet() {
  const rows = await loadSheetData();

  const TIT     = 21; // V열 = 초등/고등 교재명
  const PUB     = 23; // X열 = 초등/고등 출판사
  const MID_TIT = 21; // V열 = 중등 교재명
  const MID_PUB = 22; // W열 = 중등 출판사

  const elemMap = {
    PX: { 독해: 3,  문법: 6,  실전: 9,  청해: 12 },
    PA: { 독해: 4,  문법: 7,  실전: 10, 청해: 13 },
    PI: { 독해: 5,  문법: 8,  실전: 11, 청해: 14 },
  };
  const midMap = {
    SP: { 독해: 37, 문법: 42, 실전: 47, 청해: 52 },
    EX: { 독해: 38, 문법: 43, 실전: 48, 청해: 53 },
    AX: { 독해: 39, 문법: 44, 실전: 49, 청해: 54 },
    A:  { 독해: 40, 문법: 45, 실전: 50, 청해: 55 },
    I:  { 독해: 41, 문법: 46, 실전: 51, 청해: 56 },
  };
  const highMap = {
    HS: { 독해: 83, 문법: 86, 실전: 89 },
    HX: { 독해: 84, 문법: 87, 실전: 90 },
    HA: { 독해: 85, 문법: 88, 실전: 91 },
  };

  function setVal(secKey, cls, field, rowIdx, titCol, pubCol) {
    const key = `${secKey}_${cls}_${field}`;
    savedData[key + '_title'] = getCell(rows, rowIdx, titCol);
    savedData[key + '_pub']   = getCell(rows, rowIdx, pubCol);
    savedData[key + '_img']   = '';
  }

  for (const [cls, fields] of Object.entries(elemMap))
    for (const [field, rowIdx] of Object.entries(fields))
      setVal('elem', cls, field, rowIdx, TIT, PUB);

  for (const [cls, fields] of Object.entries(midMap))
    for (const [field, rowIdx] of Object.entries(fields))
      setVal('mid', cls, field, rowIdx, MID_TIT, MID_PUB);

  for (const [cls, fields] of Object.entries(highMap))
    for (const [field, rowIdx] of Object.entries(fields))
      setVal('high', cls, field, rowIdx, TIT, PUB);

  console.log('✅ 구글 시트 데이터 로드 완료');
}

// ========== 초기 로드 ==========
async function init() {
  const jsonLoaded = await loadJsonData();
  if (!jsonLoaded) {
    await loadFromSheet();
  }
  render();
}

// ========== 렌더링 ==========
function buildBookCell(secKey, rowClass, field) {
  const key       = `${secKey}_${rowClass}_${field}`;
  const titleText = savedData[key + '_title'] || '';
  const pubText   = savedData[key + '_pub']   || '';
  const imgSrc    = savedData[key + '_img']   || '';

  const isEmpty = !titleText && !pubText && !imgSrc;
  if (isEmpty) return '<td></td>';

  const imgHtml = imgSrc
    ? `<img src="${imgSrc}" alt="${titleText}" class="book-cover"
         style="cursor:pointer;" onclick="openPopup('${imgSrc}')"
         onerror="this.style.display='none';">`
    : '';

  return `<td><div class="book-cell">
    ${imgHtml}
    ${titleText ? `<div class="book-title">${titleText}</div>` : ''}
    ${pubText   ? `<div class="book-pub">${pubText}</div>`     : ''}
  </div></td>`;
}

function renderSection(data, type) {
  const titleClass = type === 'mid' ? 'mid' : type === 'high' ? 'high' : '';
  let html = `
    <div class="section">
      <div class="section-title ${titleClass}">${data.title}</div>
      <table>
        <thead><tr>
          <th>반명</th><th>독해</th><th>문법</th><th>실전</th>
          ${type !== 'high' ? '<th>청해</th>' : ''}
        </tr></thead>
        <tbody>`;

  for (const row of data.rows) {
    html += `<tr>
      <td><strong>${row.class}</strong></td>
      ${buildBookCell(type, row.class, '독해')}
      ${buildBookCell(type, row.class, '문법')}
      ${buildBookCell(type, row.class, '실전')}
      ${type !== 'high' ? buildBookCell(type, row.class, '청해') : ''}
    </tr>`;
  }

  html += `</tbody></table></div>`;
  return html;
}

function render() {
  const app = document.getElementById('app');
  if (!app) return;
  app.innerHTML =
    renderSection(bookData.elem, 'elem') +
    renderSection(bookData.mid,  'mid')  +
    renderSection(bookData.high, 'high') +
    `<div style="max-width:1100px; margin:0 0 40px 0; padding:0 16px;">
       <button id="settingsToggle" onclick="toggleSettings()">교재 설정</button>
     </div>`;
}

// ========== 설정 패널 ==========
function buildSettingsForm() {
  const form = document.getElementById('settingsForm');
  form.innerHTML = '';
  const sections = [
    { key: 'elem', label: '초등반' },
    { key: 'mid',  label: '중등반' },
    { key: 'high', label: '고등반' },
  ];
  const fields = ['독해', '문법', '실전', '청해'];

  const topRow = document.createElement('div');
  topRow.style = 'display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; align-items:start;';

  const leftCol  = document.createElement('div');
  const rightCol = document.createElement('div');

  function buildSecDiv(secKey) {
    const sec     = sections.find(s => s.key === secKey);
    const secData = bookData[sec.key];
    if (!secData) return null;

    const secDiv = document.createElement('div');
    secDiv.className = 'settings-section';
    secDiv.innerHTML = `<div class="settings-section-title">${sec.label}</div>`;

    secData.rows.forEach(row => {
      fields.forEach(field => {
        if (!row[field] && row[field] !== undefined) return;
        if (sec.key === 'high' && field === '청해') return;

        const key      = `${sec.key}_${row.class}_${field}`;
        const curTitle = savedData[key + '_title'] || '';
        const curPub   = savedData[key + '_pub']   || '';
        const curImg   = savedData[key + '_img']   || '';

        const rowDiv = document.createElement('div');
        rowDiv.style = 'border:1px solid #eee; border-radius:6px; padding:8px; margin-bottom:10px;';
        rowDiv.innerHTML = `
          <div style="font-size:0.78rem; font-weight:700; color:#2d5a8e; margin-bottom:6px;">${row.class} · ${field}</div>
          <div class="settings-row"><label>교재명</label>
            <input type="text" id="input_${key}_title" value="${curTitle}" placeholder="교재명" /></div>
          <div class="settings-row"><label>출판사</label>
            <input type="text" id="input_${key}_pub" value="${curPub}" placeholder="출판사" /></div>
          <div class="settings-row"><label>이미지 URL</label>
            <input type="text" id="input_${key}_img" value="${curImg}" placeholder="이미지 URL"
              oninput="previewImage('${key}', this.value)" />
            ${curImg
              ? `<img class="img-preview" id="preview_${key}" src="${curImg}" alt="미리보기">`
              : `<div class="img-preview" id="preview_${key}" style="background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#aaa;">없음</div>`}
          </div>`;
        secDiv.appendChild(rowDiv);
      });
    });
    return secDiv;
  }

  ['elem', 'high'].forEach(secKey => {
    const d = buildSecDiv(secKey);
    if (d) leftCol.appendChild(d);
  });
  const midDiv = buildSecDiv('mid');
  if (midDiv) rightCol.appendChild(midDiv);

  topRow.appendChild(leftCol);
  topRow.appendChild(rightCol);
  form.appendChild(topRow);
}

function previewImage(key, url) {
  const el = document.getElementById('preview_' + key);
  if (!el) return;
  if (url) el.outerHTML = `<img class="img-preview" id="preview_${key}" src="${url}" alt="미리보기">`;
}

function saveImageSettings() {
  const sections = [{ key: 'elem' }, { key: 'mid' }, { key: 'high' }];
  const fields   = ['독해', '문법', '실전', '청해'];

  sections.forEach(sec => {
    bookData[sec.key].rows.forEach(row => {
      fields.forEach(field => {
        if (sec.key === 'high' && field === '청해') return;
        const key     = `${sec.key}_${row.class}_${field}`;
        const titleEl = document.getElementById(`input_${key}_title`);
        const pubEl   = document.getElementById(`input_${key}_pub`);
        const imgEl   = document.getElementById(`input_${key}_img`);
        if (titleEl) savedData[key + '_title'] = titleEl.value.trim();
        if (pubEl)   savedData[key + '_pub']   = pubEl.value.trim();
        if (imgEl)   savedData[key + '_img']   = imgEl.value.trim();
      });
    });
  });

  // JSON 다운로드
  const blob = new Blob([JSON.stringify(savedData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bookImages.json';
  a.click();

  render();
  document.getElementById('settingsPanel').style.display = 'none';
  alert('✅ 저장되었습니다!\nbookImages.json을 GitHub impact7/bookdata에 올려주세요.');
}

function resetImageSettings() {
  if (!confirm('모든 데이터를 초기화하고 구글 시트에서 다시 불러올까요?')) return;
  savedData = {};
  loadFromSheet().then(() => {
    render();
    buildSettingsForm();
    alert('🗑️ 초기화되었습니다.');
  });
}

function openPopup(src) {
  document.getElementById('imgPopupImg').src = src;
  document.getElementById('imgPopup').style.display = 'flex';
}

function closePopup() {
  document.getElementById('imgPopup').style.display = 'none';
}

function saveSemester() {
  localStorage.setItem('selectedSemester', document.getElementById('semesterSelect').value);
}

const savedSemester = localStorage.getItem('selectedSemester');
if (savedSemester) document.getElementById('semesterSelect').value = savedSemester;

function toggleSettings() {
  const panel  = document.getElementById('settingsPanel');
  const isOpen = panel.style.display === 'block';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    buildSettingsForm();
    panel.scrollIntoView({ behavior: 'smooth' });
  }
}

// ========== 초기 실행 ==========
init();
</script>

<div id="imgPopup" onclick="closePopup()"
  style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
         background:rgba(0,0,0,0.7); z-index:9999;
         align-items:center; justify-content:center;">
  <img id="imgPopupImg" src="" alt="확대"
    style="max-width:80%; max-height:80%; border-radius:8px;
           box-shadow:0 4px 20px rgba(0,0,0,0.5);">
</div>

</div>
</body>
</html>
