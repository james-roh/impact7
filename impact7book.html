 <div style="display:flex; align-items:baseline; gap:12px;">

<script>
const SHEET_ID = '1d2nuMH7AvA5NB7kLdwK0EQglpVdS07-Uqo6bOWUYcJE';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=2025-26%20yearly`;

let bookData = {
  elem: { title: "초등반", rows: [
    { class: "PX", 독해: { title: "", pub: "", img: "" }, 문법: { title: "", pub: "", img: "" }, 실전: { title: "", pub: "", img: "" }, 청해: { title: "", pub: "", img: "" } },
    { class: "PA", 독해: { title: "", pub: "", img: "" }, 문법: { title: "", pub: "", img: "" }, 실전: { title: "", pub: "", img: "" }, 청해: { title: "", pub: "", img: "" } },
    { class: "PI", 독해: { title: "", pub: "", img: "" }, 문법: { title: "", pub: "", img: "" }, 실전: { title: "", pub: "", img: "" }, 청해: { title: "", pub: "", img: "" } }
  ]},
  mid: { title: "중등반", rows: [
    { class: "SP", 독해: { title: "", pub: "", img: "" }, 문법: { title: "", pub: "", img: "" }, 실전: { title: "", pub: "", img: "" }, 청해: { title: "", pub: "", img: "" } },
    { class: "EX", 독해: { title: "", pub: "", img: "" }, 문법: { title: "", pub: "", img: "" }, 실전: { title: "", pub: "", img: "" }, 청해: { title: "", pub: "", img: "" } },
    { class: "AX", 독해: { title: "", pub: "", img: "" }, 문법: { title: "", pub: "", img: "" }, 실전: { title: "", pub: "", img: "" }, 청해: { title: "", pub: "", img: "" } },
    { class: "A",  독해: { title: "", pub: "", img: "" }, 문법: { title: "", pub: "", img: "" }, 실전: { title: "", pub: "", img: "" }, 청해: { title: "", pub: "", img: "" } },
    { class: "I",  독해: { title: "", pub: "", img: "" }, 문법: { title: "", pub: "", img: "" }, 실전: { title: "", pub: "", img: "" }, 청해: { title: "", pub: "", img: "" } }
  ]},
  high: { title: "고등반", rows: [
    { class: "HS", 독해: { title: "", pub: "", img: "" }, 문법: { title: "", pub: "", img: "" }, 실전: { title: "", pub: "", img: "" } },
    { class: "HX", 독해: { title: "", pub: "", img: "" }, 문법: { title: "", pub: "", img: "" }, 실전: { title: "", pub: "", img: "" } },
    { class: "HA", 독해: { title: "", pub: "", img: "" }, 문법: { title: "", pub: "", img: "" }, 실전: { title: "", pub: "", img: "" } }
  ]}
};

async function loadSheetData() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    // 봄2 열 인덱스: S열=18, T열=19 (0-based)
    const titleCol = 21; // S열(교재명)
    const pubCol   = 23; // T열(출판사)

    // 반명→섹션/필드 매핑
    const map = {
      PX: { sec: 'elem', class: 'PX' }, PA: { sec: 'elem', class: 'PA' }, PI: { sec: 'elem', class: 'PI' },
      SP: { sec: 'mid',  class: 'SP' }, EX: { sec: 'mid',  class: 'EX' }, AX: { sec: 'mid',  class: 'AX' },
      A:  { sec: 'mid',  class: 'A'  }, I:  { sec: 'mid',  class: 'I'  },
      HS: { sec: 'high', class: 'HS' }, HX: { sec: 'high', class: 'HX' }, HA: { sec: 'high', class: 'HA' }
    };

    let curField = '';
    rows.forEach(row => {
      const cells = row.c;
      const getVal = (i) => cells[i]?.v?.toString().trim() || '';

      // 영역(독해/문법/실전/청해) 감지
      const field = getVal(1);
      if (['독해','문법','실전','청해'].includes(field)) curField = field;

      const className = getVal(4);
      const info = map[className];
      if (!info || !curField) return;

      const title = getVal(titleCol);
      const pub   = getVal(pubCol);
      if (!title) return;

      const secRows = bookData[info.sec].rows;
      const targetRow = secRows.find(r => r.class === info.class);
      if (targetRow && targetRow[curField]) {
        targetRow[curField].title = title;
        targetRow[curField].pub   = pub;
      }
    });

applySheetData();

  } catch(e) {
    console.error('시트 로드 실패:', e);
    render();
  }
}

loadSheetData();

// ────────────────────────────────────────────
// 렌더링
// ────────────────────────────────────────────
function buildBookCell(bookInfo, secKey, rowClass, field) {
  if (!bookInfo) return '<td></td>';
  if (bookInfo.title === "-") return `<td><span class="no-book">-</span></td>`;

  const imgId = `bookimg_${secKey}_${rowClass}_${field}`;
  const savedUrls = loadImageUrls();
  const key = `${secKey}_${rowClass}_${field}`;

  const imgSrc    = savedUrls[key + '_img']   || bookInfo.img   || '';
  const titleText = savedUrls[key + '_title'] || bookInfo.title || '';
  const pubText   = savedUrls[key + '_pub']   || bookInfo.pub   || '';

  const imgHtml = imgSrc
    ? `<img id="${imgId}" src="${imgSrc}" alt="${titleText}" class="book-cover"
         style="cursor:pointer;"
         onclick="openPopup('${imgSrc}')"
         onerror="this.style.display='none';">`
    : ``;



  const inner = `${imgHtml}
    ${titleText ? `<div class="book-title">${titleText}</div>` : ''}
    ${pubText ? `<div class="book-pub">${pubText}</div>` : ''}`;

  const isEmpty = !imgSrc && !titleText && !pubText;
  if (isEmpty) return '<td></td>';

  return `<td><div class="book-cell">${inner}</div></td>`;

}


function renderSection(data, type) {
  const titleClass = type === 'mid' ? 'mid' : type === 'high' ? 'high' : '';
  let html = `
    <div class="section">
      <div class="section-title ${titleClass}">${data.title}</div>

      <table>
        <thead><tr>
          <th>반명</th><th>독해</th><th>문법</th><th>실전</th>
          ${type !== 'high' ? '<th>청해</th>' : ''}
        </tr></thead>
        <tbody>`;

  for (const row of data.rows) {
    html += `<tr>
      <td><strong>${row.class}</strong></td>
      ${buildBookCell(row.독해, type, row.class, '독해')}
      ${buildBookCell(row.문법, type, row.class, '문법')}
      ${buildBookCell(row.실전, type, row.class, '실전')}
      ${row.청해 ? buildBookCell(row.청해, type, row.class, '청해') : ''}
    </tr>`;
  }

  html += `</tbody></table></div>`;
  return html;
}

function render() {
  const app = document.getElementById('app');
  if (!app) { console.error('app 없음'); return; }
  const h = renderSection(bookData.elem, 'elem') +
            renderSection(bookData.mid,  'mid')  +
            renderSection(bookData.high, 'high');
  console.log('render html 길이:', h.length);
    app.innerHTML = h +
    `<div style="max-width:1100px; margin:0 0 40px 0; padding:0 16px;">
<button id="settingsToggle" onclick="toggleSettings()" title="이미지 URL 설정">교재 설정</button>

    </div>`;

}


// ────────────────────────────────────────────
// 설정 패널
// ────────────────────────────────────────────
function loadImageUrls() {
  const saved = localStorage.getItem('bookImageUrls');
  return saved ? JSON.parse(saved) : {};
}

function saveImageUrls(data) {
  localStorage.setItem('bookImageUrls', JSON.stringify(data));
}



function buildSettingsForm() {
  const form = document.getElementById('settingsForm');
  form.innerHTML = '';
  const saved = loadImageUrls();
  const sections = [
    { key: 'elem', label: '초등반' },
    { key: 'mid',  label: '중등반' },
    { key: 'high', label: '고등반' },
  ];
  const fields = ['독해', '문법', '실전', '청해'];

  const topRow = document.createElement('div');
  topRow.style = 'display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; align-items:start;';

  const leftCol = document.createElement('div');
  const rightCol = document.createElement('div');

  function buildSecDiv(secKey) {
    const sec = sections.find(s => s.key === secKey);
    const secData = bookData[sec.key];
    if (!secData) return null;

    const secDiv = document.createElement('div');
    secDiv.className = 'settings-section';
    secDiv.innerHTML = `<div class="settings-section-title">${sec.label}</div>`;

    secData.rows.forEach(row => {
      fields.forEach(field => {
        const item = row[field];
        if (!item) return;
        const key = `${sec.key}_${row.class}_${field}`;
        const curImg   = saved[key + '_img']   || item.img   || '';
        const curTitle = saved[key + '_title'] || item.title || '';
        const curPub   = saved[key + '_pub']   || item.pub   || '';
        const rowDiv = document.createElement('div');
        rowDiv.style = 'border:1px solid #eee; border-radius:6px; padding:8px; margin-bottom:10px;';
        rowDiv.innerHTML = `
          <div style="font-size:0.78rem; font-weight:700; color:#2d5a8e; margin-bottom:6px;">${row.class} · ${field}</div>
          <div class="settings-row"><label>교재명</label><input type="text" id="input_${key}_title" value="${curTitle}" placeholder="교재명" /></div>
          <div class="settings-row"><label>출판사</label><input type="text" id="input_${key}_pub" value="${curPub}" placeholder="출판사" /></div>
          <div class="settings-row"><label>이미지 URL</label>
            <input type="text" id="input_${key}_img" value="${curImg}" placeholder="이미지 URL" oninput="previewImage('${key}', this.value)" />
            ${curImg
              ? `<img class="img-preview" id="preview_${key}" src="${curImg}" alt="미리보기">`
              : `<div class="img-preview" id="preview_${key}" style="background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#aaa;">없음</div>`}
          </div>`;
        secDiv.appendChild(rowDiv);
      });
    });
    return secDiv;
  }

  // 왼쪽 열: 초등반 + 고등반
  ['elem', 'high'].forEach(secKey => {
    const secDiv = buildSecDiv(secKey);
    if (secDiv) leftCol.appendChild(secDiv);
  });

  // 오른쪽 열: 중등반
  const midDiv = buildSecDiv('mid');
  if (midDiv) rightCol.appendChild(midDiv);

  topRow.appendChild(leftCol);
  topRow.appendChild(rightCol);
  form.appendChild(topRow);
}


function previewImage(key, url) {

  const el = document.getElementById('preview_' + key);
  if (!el) return;
  if (url) {
    el.outerHTML = `<img class="img-preview" id="preview_${key}" src="${url}" alt="미리보기">`;
  }
}

function saveImageSettings() {
  const saved = loadImageUrls();
  const sections = [
    { key: 'elem' }, { key: 'mid' }, { key: 'high' }
  ];
  const fields = ['독해', '문법', '실전', '청해'];

  sections.forEach(sec => {
    const secData = bookData[sec.key];
    if (!secData) return;
    secData.rows.forEach(row => {
      fields.forEach(field => {
        const item = row[field];
        if (!item) return;
        const key = `${sec.key}_${row.class}_${field}`;

        const titleEl = document.getElementById(`input_${key}_title`);
        const pubEl   = document.getElementById(`input_${key}_pub`);
        const imgEl   = document.getElementById(`input_${key}_img`);

        if (titleEl) saved[key + '_title'] = titleEl.value.trim();
        if (pubEl)   saved[key + '_pub']   = pubEl.value.trim();
        if (imgEl)   saved[key + '_img']   = imgEl.value.trim();
      });
    });
  });

  saveImageUrls(saved);
  render();
  document.getElementById('settingsPanel').style.display = 'none';
  alert('✅ 저장되었습니다!');
}

function resetImageSettings() {
  if (!confirm('모든 이미지 URL을 초기화할까요?')) return;
  localStorage.removeItem('bookImageUrls');
  render();
  buildSettingsForm();
  alert('🗑️ 초기화되었습니다.');
}
function openPopup(src) {
  const popup = document.getElementById('imgPopup');
  document.getElementById('imgPopupImg').src = src;
  popup.style.display = 'flex';
}

function closePopup() {
  document.getElementById('imgPopup').style.display = 'none';
}

function saveSemester() {
  const val = document.getElementById('semesterSelect').value;
  localStorage.setItem('selectedSemester', val);
}

// 페이지 로드 시 복원
const savedSemester = localStorage.getItem('selectedSemester');
if (savedSemester) document.getElementById('semesterSelect').value = savedSemester;


function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const isOpen = panel.style.display === 'block';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    buildSettingsForm();
    panel.scrollIntoView({ behavior: 'smooth' });
  }
}
// ========== 구글 시트 데이터 로드 ==========
const SHEET_ID = '1d2nuMH7AvA5NB7kLdwK0EQglpVdS07-Uqo6bOWUYcJE';
const SHEET_GID = '37076610';


async function loadSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));
  return json.table.rows.map(row =>
    row.c ? row.c.map(cell => (cell && cell.v !== null ? String(cell.v).trim() : '')) : []
  );
}

function getCell(rows, rowIdx, colIdx) {
  return (rows[rowIdx] && rows[rowIdx][colIdx]) ? rows[rowIdx][colIdx] : '';
}

async function applySheetData() {
  try {
    const rows = await loadSheetData();

    // V=21번째(인덱스 21), W=22번째(인덱스 22) → 봄2학기 교재명/출판사
    const TIT = 21; // V열
    const PUB = 22; // W열
    const NAME = 4;  // E열 = 반명

    // 각 행 번호 매핑 (0-based index, 헤더 제외)
    // 초등반 (rows 3~14): PX/PA/PI × 독해/문법/실전/청해
    const elemMap = {
      PX: { 독해: 3,  문법: 6,  실전: 9,  청해: 12 },
      PA: { 독해: 4,  문법: 7,  실전: 10, 청해: 13 },
      PI: { 독해: 5,  문법: 8,  실전: 11, 청해: 14 },
    };

    // 중등 1학년 (rows 36~52): SP/EX/AX/A/I × 독해/문법/실전/청해
    const midMap = {
      SP: { 독해: 36, 문법: 41, 실전: 46, 청해: 51 },
      EX: { 독해: 37, 문법: 42, 실전: 47, 청해: 52 },
      AX: { 독해: 38, 문법: 43, 실전: 48, 청해: 53 },
      A:  { 독해: 39, 문법: 44, 실전: 49, 청해: 54 },
      I:  { 독해: 40, 문법: 45, 실전: 50, 청해: 55 },
    };

    // 고등반 (rows 에서 HS/HX/HA)
    const highMap = {
      HS: { 독해: 83, 문법: 86, 실전: 89 },
      HX: { 독해: 84, 문법: 87, 실전: 90 },
      HA: { 독해: 85, 문법: 88, 실전: 91 },
    };

    const saved = loadImageUrls();
    let updated = false;

    function applyIfEmpty(secKey, classKey, field, rowIdx) {
      const key = `${secKey}_${classKey}_${field}`;
      const titleKey = key + '_title';
      const pubKey   = key + '_pub';
      // 이미 저장된 값이 있으면 덮어쓰지 않음
      if (!saved[titleKey]) {
        saved[titleKey] = getCell(rows, rowIdx, TIT);
        updated = true;
      }
      if (!saved[pubKey]) {
        saved[pubKey] = getCell(rows, rowIdx, PUB);
        updated = true;
      }
    }

    // 초등반
    for (const [cls, fields] of Object.entries(elemMap)) {
      for (const [field, rowIdx] of Object.entries(fields)) {
        applyIfEmpty('elem', cls, field, rowIdx);
      }
    }
    // 중등반
    for (const [cls, fields] of Object.entries(midMap)) {
      for (const [field, rowIdx] of Object.entries(fields)) {
        applyIfEmpty('mid', cls, field, rowIdx);
      }
    }
    // 고등반
    for (const [cls, fields] of Object.entries(highMap)) {
      for (const [field, rowIdx] of Object.entries(fields)) {
        applyIfEmpty('high', cls, field, rowIdx);
      }
    }

    if (updated) {
      saveImageUrls(saved);
      console.log('✅ 구글 시트 데이터 적용 완료');
    }
    render();
  } catch(e) {
    console.error('시트 로드 실패:', e);
    render();
  }
}

// 초기 실행

</script>
