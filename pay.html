   .staff-table td { color: #333; text-align: center; vertical-align: middle; }

<script>
  const CLIENT_ID   = '497398575943-80nlgu93m2517h85e632an0a9g4622tl.apps.googleusercontent.com';
  const STORAGE_KEY = 'impact7_user';
  let _token = null;

  function googleLogin() {
    google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'email profile',
      callback: async (res) => {
        if (!res.access_token) return showLoginError('로그인 실패. 다시 시도해주세요.');
        _token = res.access_token;
        const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: 'Bearer ' + _token }
        }).then(r => r.json());
        if (!info.email.endsWith('@impact7.kr')) {
          return showLoginError('impact7.kr 계정으로만 로그인 가능합니다.');
        }
        const user = { email: info.email, name: info.name, token: _token };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
        showApp(user);
      }
    }).requestAccessToken();
  }

  function showApp(user) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('headerUser').textContent = user.name + ' 님';
    renderStaffTable();
    loadData();
  }

  function logout() {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }

function showLoginError(msg) {
    document.getElementById('loginError').textContent = msg;
  }

  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const user = JSON.parse(saved);
      _token = user.token;
      showApp(user);
    } else {
      document.getElementById('loginOverlay').style.display = 'flex';
    }
  });


  // ── 기본 근무자 데이터 ────────────────────────
  const DEFAULT_STAFF = {
    locations: ['양지', '고등', '10단지'],
    days: ['월금', '화목'],
    members: {
      '양지': { '월금': ['곽다연', '한지우'], '화목': ['정혜림', '부소영'] },
      '고등': { '월금': ['백교원'],           '화목': ['김서인']           },
      '10단지': { '월금': ['서예빈', '박서진'], '화목': ['김주아', '이지호'] }
    }
  };

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxTPuWng2G-iZE_02_j7r_oBC4NJAIvLt1Y233_xviLZhWOL_5gagAowNY6usETF9-Q5A/exec';
const STAFF_KEY = 'impact7_staff';


  // ── 저장된 데이터 불러오기 ─────────────────────
async function getStaffFromSheet() {
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=getStaff`, { redirect: 'follow' });
      const data = await res.json();
      if (data.success && data.data) {
        localStorage.setItem(STAFF_KEY, JSON.stringify(data.data));
        return data.data;
      }
    } catch(err) {}
    return DEFAULT_STAFF;
  }

  function getStaff() {
    const saved = localStorage.getItem(STAFF_KEY);
    return saved ? JSON.parse(saved) : DEFAULT_STAFF;
  }


  // ── 근무자 테이블 렌더링 ───────────────────────
  function renderStaffTable() {
    const staff = getStaff();
    const { locations, days, members } = staff;
    const table = document.getElementById('staffTable');

    let html = '<thead><tr>';
    html += '<th>구분</th>';
    locations.forEach(loc => html += `<th>${loc}</th>`);
    html += '</tr></thead><tbody>';

    days.forEach(day => {
      // 각 근무지별 최대 인원수 계산
      const maxCount = Math.max(...locations.map(loc =>
        (members[loc]?.[day] || []).length
      ));

for (let i = 0; i < maxCount; i++) {
  html += '<tr>';
  if (i === 0) {
    html += `<td rowspan="${maxCount}" style="background:#fafafa; font-weight:600; color:#555;">${day}</td>`;
  }
  locations.forEach(loc => {
    const names = members[loc]?.[day] || [];
    html += `<td style="background:#fff;">${names[i] || ''}</td>`;
  });
  html += '</tr>';
}

    });

    html += '</tbody>';
    table.innerHTML = html;
  }

  // ── 모달 열기 ─────────────────────────────────
  function openModal() {
    const staff = getStaff();
    const { locations, days, members } = staff;
    const modal = document.getElementById('modalContent');

    let html = '';
    locations.forEach(loc => {
      html += `<div class="location-block">
        <div class="location-label">📍 ${loc}</div>`;
      days.forEach(day => {
        const names = members[loc]?.[day] || ['', ''];
        html += `<div class="day-block">
          <div class="day-label">${day}</div>
          <div class="name-inputs">`;
        // 최대 4명까지 입력 가능
        for (let i = 0; i < 4; i++) {
          html += `<input class="name-input"
            data-loc="${loc}" data-day="${day}" data-idx="${i}"
            value="${names[i] || ''}"
            placeholder="이름${i+1}" />`;
        }
        html += `</div></div>`;
      });
      html += `</div>`;
    });

    modal.innerHTML = html;
    document.getElementById('modalOverlay').classList.add('open');
  }

  // ── 모달 닫기 ─────────────────────────────────
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  // ── 저장 ──────────────────────────────────────
async function saveStaff() {
    const staff = getStaff();
    const inputs = document.querySelectorAll('.name-input');

    staff.locations.forEach(loc => {
      staff.members[loc] = {};
      staff.days.forEach(day => {
        staff.members[loc][day] = [];
      });
    });

    inputs.forEach(input => {
      const loc = input.dataset.loc;
      const day = input.dataset.day;
      const val = input.value.trim();
      if (val) staff.members[loc][day].push(val);
    });

    localStorage.setItem(STAFF_KEY, JSON.stringify(staff));

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'saveStaff', json: JSON.stringify(staff) })
      });
    } catch(err) {}

    renderStaffTable();
    closeModal();
  }


  // ── 모달 외부 클릭시 닫기 ─────────────────────
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  // ── 더미 데이터 ───────────────────────────────
  const DUMMY_DATA = [
    {
      '타임스탬프'              : '2025-04-01 09:00',

      '청구 금액 (숫자만 입력)' : '1500000',
      '청구서 업로드'           : 'https://drive.google.com'
    },
    {
      '타임스탬프'              : '2025-05-01 10:30',
      '이름'                   : '홍길동',
      '근무지 선택'             : '강남점',
      '근로 월 선택'            : '2025년 4월',
      '청구 금액 (숫자만 입력)' : '1600000',
      '청구서 업로드'           : ''
    },
    {
      '타임스탬프'              : '2025-06-01 11:00',
      '이름'                   : '홍길동',
      '근무지 선택'             : '서초점',
      '근로 월 선택'            : '2025년 5월',
      '청구 금액 (숫자만 입력)' : '1700000',
      '청구서 업로드'           : 'https://drive.google.com'
    }
  ];

  // ── 데이터 로드 ───────────────────────────────
async function loadData() {
    document.getElementById('claimBody').innerHTML =
      `<tr><td colspan="6" style="text-align:center; padding:40px; color:#aaa;">불러오는 중...</td></tr>`;
    try {
      const url = `${SCRIPT_URL}?action=getMyData&token=test`;
      const res = await fetch(url, { redirect: 'follow' });
      const data = await res.json();

      if (data.success) {
        const allData = data.data;
        window._allData = allData;

        // 중복 제거
        const map = {};
        allData.forEach(r => {
          const key = r['이름'] + '_' + r['근로 월 선택'];
          const amount = Number(r['청구 금액 (숫자만 입력)'] || 0);
          if (!map[key] || amount < Number(map[key]['청구 금액 (숫자만 입력)'] || 0)) {
            map[key] = r;
          }
        });
        const filteredData = Object.values(map);

        // 드롭다운 월 목록 추출
        const months = [...new Set(allData.map(r => r['근로 월 선택']))].filter(m => m);
        const select = document.getElementById('monthFilter');
        select.innerHTML = '<option value="all">전체 월</option>';
        months.forEach(m => {
          select.innerHTML += `<option value="${m}">${m}</option>`;
        });
        if (months.length) select.value = months[0];

        renderDuplicates(allData);
        renderSummary(filteredData);
        renderTable(filteredData);
        renderCards(filteredData);

      } else {
        document.getElementById('claimBody').innerHTML =
          `<tr><td colspan="6" style="text-align:center; padding:40px; color:#aaa;">⚠️ ${data.error}</td></tr>`;
      }
    } catch(err) {
      document.getElementById('claimBody').innerHTML =
        `<tr><td colspan="6" style="text-align:center; padding:40px; color:#aaa;">⚠️ ${err.message}</td></tr>`;
    }
  }


function formatDate(val) {
    if (!val) return '-';
    const d = new Date(val);
    if (isNaN(d)) return val;
    const yyyy = d.getFullYear();
    const mm   = d.getMonth() + 1;
    const dd   = d.getDate();
    const hh   = d.getHours();
    const min  = String(d.getMinutes()).padStart(2, '0');
    const ampm = hh < 12 ? '오전' : '오후';
    const hour = hh % 12 || 12;
    return `${yyyy}. ${mm}. ${dd} ${ampm} ${hour}:${min}`;
  }

  // ── 테이블 렌더링 ─────────────────────────────
  function renderTable(rows) {
    const tbody = document.getElementById('claimBody');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">📋 청구서가 없습니다</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
      <td>${formatDate(r['타임스탬프'])}</td>

        <td>${r['이름'] || '-'}</td>
        <td>${r['근무지 선택'] || '-'}</td>
        <td>${r['근로 월 선택'] || '-'}</td>
        <td class="amount">${Number(r['청구 금액 (숫자만 입력)']).toLocaleString()}원</td>
        <td>${r['청구서 업로드']
          ? `<a href="${r['청구서 업로드']}" target="_blank">보기</a>`
          : '-'}</td>
      </tr>
    `).join('');
  }
function renderDuplicates(allRows) {
    const map = {};
    allRows.forEach(r => {
      const key = r['이름'] + '_' + r['근로 월 선택'];
      if (!map[key]) map[key] = [];
      map[key].push(r);
    });

    const duplicates = Object.values(map).filter(group => group.length > 1);
    const wrap = document.getElementById('duplicateWrap');
    const list = document.getElementById('duplicateList');

if (!duplicates.length) {
      list.innerHTML = '<span style="color:#aaa; font-size:.9rem;">중복 없음 ✅</span>';
      return;
    }
list.innerHTML = duplicates.map(group => `
      <div style="margin-bottom:12px; font-size:.9rem;">
        <b>${group[0]['이름']}</b> (${group[0]['근로 월 선택']})<br>
        ${group.map(r => `
          &nbsp;&nbsp;• ${Number(r['청구 금액 (숫자만 입력)']).toLocaleString()}원
          ${r['청구서 업로드'] ? `<a href="${r['청구서 업로드']}" target="_blank" style="margin-left:8px; color:#4285F4; font-size:.8rem;">청구서 보기</a>` : ''}
        `).join('<br>')}
      </div>
    `).join('');

  }
function renderSummary(rows) {
    const recentMonth = rows.length ? rows[0]['근로 월 선택'] : null;
    if (!recentMonth) return;

    const recentRows = rows.filter(r => r['근로 월 선택'] === recentMonth);
    const wrap = document.getElementById('summaryWrap');
    const text = document.getElementById('summaryText');

    if (!recentRows.length) {
      wrap.style.display = 'none';
      return;
    }

const lines = recentRows.map(r =>
      `${r['이름']}, ${r['급여계좌 선택']}, ${r['계좌번호 (숫자만 입력)']}, ${Number(r['청구 금액 (숫자만 입력)']).toLocaleString()}원`
    ).join('\n');


    wrap.style.display = 'block';
    text.innerText = lines;
  }

  function copySummary() {
    const text = document.getElementById('summaryText').innerText;
    navigator.clipboard.writeText(text).then(() => {
      alert('복사되었습니다! ✅');
    });
  }
function filterByMonth() {
    const selected = document.getElementById('monthFilter').value;
    const allData  = window._allData || [];

    const filtered = selected === 'all'
      ? allData
      : allData.filter(r => r['근로 월 선택'] === selected);

    const map = {};
    filtered.forEach(r => {
      const key    = r['이름'] + '_' + r['근로 월 선택'];
      const amount = Number(r['청구 금액 (숫자만 입력)'] || 0);
      if (!map[key] || amount < Number(map[key]['청구 금액 (숫자만 입력)'] || 0)) {
        map[key] = r;
      }
    });
    const filteredData = Object.values(map);

    renderDuplicates(filtered);
    renderSummary(filteredData);
    renderTable(filteredData);
    renderCards(filteredData);
  }

  // ── 카드 렌더링 ───────────────────────────────
  function renderCards(rows) {
    const recentMonth = rows.length ? rows[0]['근로 월 선택'] : '-';
    const total = rows
      .filter(r => r['근로 월 선택'] === recentMonth)
      .reduce((s, r) => s + Number(r['청구 금액 (숫자만 입력)'] || 0), 0);
    const notSubmitted = (() => {
      const submitted = rows
        .filter(r => r['근로 월 선택'] === recentMonth)
        .map(r => r['이름']);
      const staff = getStaff();
      const allMembers = [];
      staff.locations.forEach(loc => {
        staff.days.forEach(day => {
          (staff.members[loc]?.[day] || []).forEach(name => {
            if (name && !allMembers.includes(name)) allMembers.push(name);
          });
        });
      });
      return allMembers.filter(name => !submitted.includes(name));
    })();
    document.getElementById('cardCount').textContent  = notSubmitted.length ? notSubmitted.join(', ') : '전원 제출 ✅';
    document.getElementById('cardTotal').textContent  = total.toLocaleString() + '원';
    document.getElementById('cardRecent').textContent = recentMonth || '-';
  }




</script>
</body>
</html>
