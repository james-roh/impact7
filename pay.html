<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>급여청구서 | Impact7</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }

    /* 로그인 오버레이 */
    #loginOverlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    .login-box {
      background: #fff; border-radius: 16px;
      padding: 48px 40px; text-align: center;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .login-box h1 { font-size: 1.5rem; margin-bottom: 8px; color: #1a1a2e; }
    .login-box p  { color: #888; margin-bottom: 28px; font-size: .95rem; }
    .btn-google {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 24px; border-radius: 8px;
      border: 2px solid #ddd; background: #fff;
      font-size: 1rem; cursor: pointer;
      transition: box-shadow .2s;
    }
    .btn-google:hover { box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    #loginError {
      color: #EA4335; font-size: .85rem;
      margin-top: 14px; display: none;
    }

    /* 헤더 */
    .header {
      background: #1a1a2e; color: #fff;
      padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header h2 { font-size: 1.1rem; }
    .user-info  { display: flex; align-items: center; gap: 10px; font-size: .9rem; }
    .btn-logout {
      background: rgba(255,255,255,.15); border: none;
      color: #fff; padding: 6px 14px; border-radius: 6px;
      cursor: pointer; font-size: .85rem;
    }
    .btn-logout:hover { background: rgba(255,255,255,.25); }

    /* 컨텐츠 */
    .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }

    /* 요약 카드 */
    .cards {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 28px;
    }
    .card {
      background: #fff; border-radius: 12px;
      padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .card-label { font-size: .8rem; color: #888; margin-bottom: 6px; }
    .card-value { font-size: 1.5rem; font-weight: 700; color: #4285F4; }

    /* 테이블 */
    .table-wrap {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: auto;
    }
    .table-header {
      padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #f0f0f0;
    }
    .table-header h3 { font-size: 1rem; color: #333; }
    .btn-refresh {
      background: #f0f2f5; border: none;
      padding: 6px 14px; border-radius: 6px;
      cursor: pointer; font-size: .85rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f5f5f5; font-size: .9rem; }
    th { background: #fafafa; color: #666; font-size: .8rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }
    .empty { text-align: center; padding: 48px; color: #bbb; }

    /* 상태 뱃지 */
    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: .78rem; font-weight: 600;
    }
    .badge-done { background: #D4EDDA; color: #155724; }

    /* 로딩 */
    #loading {
      text-align: center; padding: 48px;
      color: #888; display: none;
    }
  </style>
</head>
<body>

<!-- 로그인 오버레이 -->
<div id="loginOverlay">
  <div class="login-box">
    <h1>💰 급여청구서 조회</h1>
    <p>Impact7 공식 계정으로 로그인하세요</p>
    <button class="btn-google" onclick="googleLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" />
      Google 로그인
    </button>
    <div id="loginError"></div>
  </div>
</div>

<!-- 헤더 -->
<div class="header">
  <h2>💰 급여청구서 관리</h2>
  <div class="user-info">
    <span id="headerUser"></span>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </div>
</div>

<!-- 메인 -->
<div class="container">
  <!-- 요약 카드 -->
  <div class="cards">
    <div class="card">
      <div class="card-label">총 청구 건수</div>
      <div class="card-value" id="cardCount">-</div>
    </div>
    <div class="card">
      <div class="card-label">총 청구 금액</div>
      <div class="card-value" id="cardTotal">-</div>
    </div>
    <div class="card">
      <div class="card-label">최근 청구월</div>
      <div class="card-value" id="cardRecent">-</div>
    </div>
  </div>

  <!-- 테이블 -->
  <div class="table-wrap">
    <div class="table-header">
      <h3>📋 내 청구서 목록</h3>
      <button class="btn-refresh" onclick="loadData()">🔄 새로고침</button>
    </div>
    <div id="loading">불러오는 중...</div>
    <table id="claimTable">
      <thead>
        <tr>
          <th>제출일시</th>
          <th>이름</th>
          <th>근무지</th>
          <th>근로월</th>
          <th>청구금액</th>
          <th>청구서</th>
        </tr>
      </thead>
      <tbody id="claimBody">
        <tr><td colspan="6" class="empty">로그인 후 조회됩니다</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const CLIENT_ID      = '497398575943-80nlgu93m2517h85e632an0a9g4622tl.apps.googleusercontent.com';
  const SCRIPT_URL     = 'https://script.google.com/macros/s/AKfycbxTPuWng2G-iZE_02_j7r_oBC4NJAIvLt1Y233_xviLZhWOL_5gagAowNY6usETF9-Q5A/exec';
  const ALLOWED_DOMAIN = '@impact7.kr';
  const STORAGE_KEY    = 'impact7_user';

  let _token = null;

  // ── 자동 로그인 체크 ──────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const user = JSON.parse(saved);
      _token = user.token;
      showApp(user);
    }
  });

  // ── 구글 로그인 ──────────────────────────────
  function googleLogin() {
    google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'email profile',
      callback: async (res) => {
        if (!res.access_token) return showLoginError('로그인 실패. 다시 시도해주세요.');
        _token = res.access_token;

        const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: 'Bearer ' + _token }
        }).then(r => r.json());

        if (!info.email.endsWith(ALLOWED_DOMAIN)) {
          return showLoginError('impact7.kr 계정으로만 로그인 가능합니다.');
        }

        const user = {
          email : info.email,
          name  : info.name,
          userId: info.email.split('@')[0],
          token : _token
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
        showApp(user);
      }
    }).requestAccessToken();
  }

  // ── 앱 표시 ──────────────────────────────────
  function showApp(user) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('headerUser').textContent = user.name + ' 님';
    loadData();
  }

  // ── 데이터 불러오기 ───────────────────────────
  async function loadData() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('claimBody').innerHTML = '';

    try {
      const url = `${SCRIPT_URL}?action=getMyData&token=${_token}`;
      const res = await fetch(url, { redirect: 'follow' });
      const data = await res.json();

      document.getElementById('loading').style.display = 'none';

      if (!data.success) {
        document.getElementById('claimBody').innerHTML =
          `<tr><td colspan="6" class="empty">⚠️ ${data.error}</td></tr>`;
        return;
      }

      renderTable(data.data);
      renderCards(data.data);

    } catch(err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('claimBody').innerHTML =
        `<tr><td colspan="6" class="empty">⚠️ 서버 연결 실패</td></tr>`;
    }
  }

  // ── 테이블 렌더링 ─────────────────────────────
  function renderTable(rows) {
    const tbody = document.getElementById('claimBody');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">📋 청구서가 없습니다</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${r['타임스탬프'] || '-'}</td>
        <td>${r['이름'] || '-'}</td>
        <td>${r['근무지 선택'] || '-'}</td>
        <td>${r['근로 월 선택'] || '-'}</td>
        <td><b>${Number(r['청구 금액 (숫자만 입력)']).toLocaleString()}원</b></td>
        <td>${r['청구서 업로드'] ? `<a href="${r['청구서 업로드']}" target="_blank">보기</a>` : '-'}</td>
      </tr>
    `).join('');
  }

  // ── 카드 렌더링 ───────────────────────────────
  function renderCards(rows) {
    const total  = rows.reduce((s, r) => s + Number(r['청구 금액 (숫자만 입력)'] || 0), 0);
    const recent = rows.length ? rows[rows.length - 1]['근로 월 선택'] : '-';
    document.getElementById('cardCount').textContent  = rows.length + '건';
    document.getElementById('cardTotal').textContent  = total.toLocaleString() + '원';
    document.getElementById('cardRecent').textContent = recent || '-';
  }

  // ── 로그아웃 ──────────────────────────────────
  function logout() {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }

  // ── 로그인 에러 표시 ──────────────────────────
  function showLoginError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
