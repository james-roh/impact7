<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>근로계약서 관리 - 임팩트세븐학원</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', Arial, sans-serif; background: #f5f5f5; }

    /* 로그인 화면 */
    #loginView {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; background: #f5f5f5;
    }
    .login-box {
      background: #fff; border-radius: 12px; padding: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; width: 360px;
    }
    .login-box h1 { font-size: 20px; color: #333; margin-bottom: 8px; }
    .login-box p  { font-size: 14px; color: #888; margin-bottom: 24px; }
    .login-error  { color: #e53935; font-size: 13px; margin-top: 12px; display: none; }

    /* 대시보드 */
    #dashView { display: none; }
    .header {
      background: #fff; padding: 16px 24px;
      border-bottom: 1px solid #ddd;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 18px; color: #333; }
    .header .user-info { font-size: 13px; color: #666; display: flex; align-items: center; gap: 12px; }
    .btn-logout {
      padding: 6px 14px; background: #f5f5f5; border: 1px solid #ddd;
      border-radius: 6px; cursor: pointer; font-size: 13px; color: #555;
    }
    .btn-logout:hover { background: #eee; }

    /* 필터 영역 */
    .filter-bar {
      background: #fff; padding: 16px 24px;
      border-bottom: 1px solid #ddd;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .filter-bar input, .filter-bar select {
      padding: 8px 12px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 14px; outline: none;
    }
    .filter-bar input:focus { border-color: #4CAF50; }
    .filter-bar label { font-size: 13px; color: #555; }
    .btn-search {
      padding: 8px 20px; background: #4CAF50; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    .btn-reset {
      padding: 8px 16px; background: #aaa; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
    }

    /* 테이블 */
    .table-wrap { padding: 24px; overflow-x: auto; }
    .summary { font-size: 13px; color: #888; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; background: #fff;
            border-radius: 10px; overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    thead { background: #4CAF50; color: #fff; }
    thead th { padding: 13px 16px; text-align: left; font-size: 14px; font-weight: bold; }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
    tbody tr:hover { background: #f9fbe7; }
    tbody td { padding: 12px 16px; font-size: 14px; color: #333; }
    tbody td.muted { color: #aaa; font-size: 13px; }
    .btn-pdf {
      padding: 5px 12px; background: #1976D2; color: #fff;
      border: none; border-radius: 5px; cursor: pointer; font-size: 12px;
      text-decoration: none; display: inline-block;
    }
    .btn-pdf:hover { background: #1565C0; }
    .no-data { text-align: center; padding: 40px; color: #aaa; font-size: 15px; }

    /* 로딩 */
    .loading { text-align: center; padding: 60px; color: #aaa; font-size: 15px; }
    .spinner {
      width: 36px; height: 36px; border: 4px solid #ddd;
      border-top-color: #4CAF50; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginView">
  <div class="login-box">
    <h1>임팩트세븐학원</h1>
    <p>근로계약서 관리 시스템<br>@impact7.kr 계정으로 로그인하세요</p>
    <div id="g_id_onload"
      data-client_id="497398575943-80nlgu93m2517h85e632an0a9g4622tl.apps.googleusercontent.com"
      data-callback="handleCredential"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="outline"
      data-text="sign_in_with"
      data-shape="rectangular"
      data-logo_alignment="left"
      data-width="280">
    </div>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashView">
  <div class="header">
    <h1>📋 근로계약서 관리</h1>
    <div class="user-info">
      <span id="userEmail"></span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="filter-bar">
    <div>
      <label>이름 검색</label><br>
      <input type="text" id="searchName" placeholder="직원명 입력" style="width:160px;">
    </div>
    <div>
      <label>작성일 시작</label><br>
      <input type="date" id="dateFrom">
    </div>
    <div>
      <label>작성일 종료</label><br>
      <input type="date" id="dateTo">
    </div>
    <div style="align-self:flex-end;">
      <button class="btn-search" onclick="applyFilter()">검색</button>
      <button class="btn-reset"  onclick="resetFilter()">초기화</button>
    </div>
  </div>

  <div class="table-wrap">
    <div class="summary" id="summary"></div>
    <div id="tableArea">
      <div class="loading">
        <div class="spinner"></div>
        데이터를 불러오는 중입니다...
      </div>
    </div>
  </div>
</div>

<script>
  // =============================================
  // 설정
  // =============================================
  const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbycF38lIhLqSBDgxNVCJZK34HeBOcGmZXqUDzYR2bQ8dcx54XZUe0z5ip2j89K8dFuZ/exec';
  const ALLOWED_DOMAIN = 'impact7.kr';

  let allData = [];

  // =============================================
  // Google 로그인 콜백
  // =============================================
  function handleCredential(response) {
    const payload = parseJwt(response.credential);
    const email   = payload.email || '';
    const domain  = email.split('@')[1];

    if (domain !== ALLOWED_DOMAIN) {
      const errEl = document.getElementById('loginError');
      errEl.textContent = `@${ALLOWED_DOMAIN} 계정만 접근 가능합니다. (현재: ${email})`;
      errEl.style.display = 'block';
      return;
    }

    // 로그인 성공
    document.getElementById('userEmail').textContent = email;
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashView').style.display  = 'block';
    loadData();
  }

  function parseJwt(token) {
    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join('')));
  }

  function logout() {
    google.accounts.id.disableAutoSelect();
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('dashView').style.display  = 'none';
    document.getElementById('tableArea').innerHTML = '<div class="loading"><div class="spinner"></div>데이터를 불러오는 중입니다...</div>';
    allData = [];
  }

  // =============================================
  // 데이터 로드
  // =============================================
  function loadData() {
    fetch(`${SCRIPT_URL}?action=getData`)
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          allData = res.data;
          renderTable(allData);
        } else {
          document.getElementById('tableArea').innerHTML =
            `<div class="no-data">데이터 로드 오류: ${res.message}</div>`;
        }
      })
      .catch(err => {
        document.getElementById('tableArea').innerHTML =
          `<div class="no-data">네트워크 오류: ${err.message}</div>`;
      });
  }

  // =============================================
  // 테이블 렌더링
  // =============================================
  function renderTable(data) {
    document.getElementById('summary').textContent = `총 ${data.length}건`;

    if (data.length === 0) {
      document.getElementById('tableArea').innerHTML =
        '<div class="no-data">검색 결과가 없습니다.</div>';
      return;
    }

    let rows = '';
    data.forEach((row, i) => {
      const pdfBtn = row.pdfUrl
        ? `<a class="btn-pdf" href="${row.pdfUrl}" target="_blank">PDF 열기</a>`
        : `<span class="muted">-</span>`;
      rows += `
        <tr>
          <td>${i + 1}</td>
          <td>${row.직원명 || '-'}</td>
          <td>${row.주소   || '-'}</td>
          <td>${row.연락처 || '-'}</td>
          <td>${row.주민번호 || '-'}</td>
          <td>${row.작성일  || '-'}</td>
          <td>${pdfBtn}</td>
        </tr>`;
    });

    document.getElementById('tableArea').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>직원명</th>
            <th>주소</th>
            <th>연락처</th>
            <th>주민번호</th>
            <th>작성일</th>
            <th>계약서</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // =============================================
  // 필터
  // =============================================
  function applyFilter() {
    const name     = document.getElementById('searchName').value.trim().toLowerCase();
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo   = document.getElementById('dateTo').value;

    const filtered = allData.filter(row => {
      const nameMatch = !name || (row.직원명 || '').toLowerCase().includes(name);
      const rowDate   = row.작성일 || '';
      const fromMatch = !dateFrom || rowDate >= dateFrom;
      const toMatch   = !dateTo   || rowDate <= dateTo;
      return nameMatch && fromMatch && toMatch;
    });

    renderTable(filtered);
  }

  function resetFilter() {
    document.getElementById('searchName').value = '';
    document.getElementById('dateFrom').value   = '';
    document.getElementById('dateTo').value     = '';
    renderTable(allData);
  }
</script>
</body>
</html>
