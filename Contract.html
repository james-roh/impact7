<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>근로계약서 관리 - 임팩트세븐학원</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', Arial, sans-serif; background: #f0f2f5; }

    /* 로그인 화면 */
    #loginView {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; background: #f0f2f5;
    }
    .login-box {
      background: #fff; border-radius: 12px; padding: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; width: 360px;
    }
    .login-box h1 { font-size: 20px; color: #333; margin-bottom: 8px; }
    .login-box p  { font-size: 14px; color: #888; margin-bottom: 28px; line-height: 1.6; }
    .login-error  { color: #e53935; font-size: 13px; margin-top: 12px; display: none; }

    /* 전체 레이아웃 */
    #dashView { display: none; height: 100vh; flex-direction: column; }
    #dashView.show { display: flex; }

    /* 헤더 */
    .header {
      background: #fff; padding: 14px 24px;
      border-bottom: 1px solid #ddd;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .header h1 { font-size: 17px; color: #333; display: flex; align-items: center; gap: 8px; }
    .header .user-info { font-size: 13px; color: #666; display: flex; align-items: center; gap: 12px; }
    .btn-logout {
      padding: 6px 14px; background: #f5f5f5; border: 1px solid #ddd;
      border-radius: 6px; cursor: pointer; font-size: 13px; color: #555;
    }
    .btn-logout:hover { background: #eee; }

    /* 본문 (사이드바 + 메인) */
    .body-wrap { display: flex; flex: 1; overflow: hidden; }

    /* 사이드바 */
    .sidebar {
      width: 200px; background: #2e7d32; color: #fff;
      flex-shrink: 0; padding: 20px 0;
      display: flex; flex-direction: column;
    }
    .sidebar-title {
      font-size: 11px; color: #a5d6a7; padding: 0 20px 12px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .sidebar-menu {
      list-style: none;
    }
    .sidebar-menu li a {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; color: #c8e6c9; text-decoration: none;
      font-size: 14px; transition: background 0.15s; cursor: pointer;
    }
    .sidebar-menu li a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar-menu li a.active { background: rgba(255,255,255,0.2); color: #fff; font-weight: bold; }
    .sidebar-menu li a .icon { font-size: 16px; }

    /* 메인 */
    .main { flex: 1; overflow-y: auto; padding: 24px; }

    /* 페이지 제목 */
    .page-title {
      font-size: 18px; font-weight: bold; color: #333;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 2px solid #4CAF50;
    }

    /* 필터 */
    .filter-bar {
      background: #fff; border-radius: 10px; padding: 16px 20px;
      margin-bottom: 16px; display: flex; gap: 12px;
      flex-wrap: wrap; align-items: flex-end;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .filter-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
    .filter-group input {
      padding: 8px 12px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 14px; outline: none;
    }
    .filter-group input:focus { border-color: #4CAF50; }
    .btn-search {
      padding: 8px 20px; background: #4CAF50; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold;
    }
    .btn-reset {
      padding: 8px 16px; background: #aaa; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    .btn-search:hover { background: #388E3C; }
    .btn-reset:hover  { background: #999; }

    /* 테이블 */
    .table-card {
      background: #fff; border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden;
    }
    .summary {
      font-size: 13px; color: #888; padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #4CAF50; color: #fff; }
    thead th { padding: 13px 16px; text-align: left; font-size: 13px; font-weight: bold; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #f5f5f5; transition: background 0.15s; }
    tbody tr:hover { background: #f9fbe7; }
    tbody td { padding: 12px 16px; font-size: 14px; color: #333; }
    tbody td.name { font-weight: bold; min-width: 80px; }
    tbody td.addr { min-width: 200px; }
    .btn-pdf {
      padding: 5px 12px; background: #1976D2; color: #fff;
      border: none; border-radius: 5px; cursor: pointer;
      font-size: 12px; text-decoration: none; display: inline-block;
    }
    .btn-pdf:hover { background: #1565C0; }
    .no-data { text-align: center; padding: 50px; color: #bbb; font-size: 15px; }

    /* 로딩 */
    .loading { text-align: center; padding: 60px; color: #aaa; }
    .spinner {
      width: 36px; height: 36px; border: 4px solid #ddd;
      border-top-color: #4CAF50; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginView">
  <div class="login-box">
    <h1>임팩트세븐학원</h1>
    <p>근로계약서 관리 시스템<br>@impact7.kr 계정으로 로그인하세요</p>
    <div id="g_id_onload"
      data-client_id="497398575943-80nlgu93m2517h85e632an0a9g4622tl.apps.googleusercontent.com"
      data-callback="handleCredential"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="outline"
      data-text="sign_in_with"
      data-shape="rectangular"
      data-logo_alignment="left"
      data-width="280">
    </div>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashView">
  <!-- 헤더 -->
  <div class="header">
    <h1>📋 근로계약서 관리</h1>
    <div class="user-info">
      <span id="userEmail"></span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="body-wrap">
    <!-- 사이드바 -->
    <div class="sidebar">
      <div class="sidebar-title">직원 구분</div>
      <ul class="sidebar-menu">
        <li>
          <a class="active" id="menu-tutor" onclick="switchMenu('tutor')">
            <span class="icon">👩‍🏫</span> 학습교사
          </a>
        </li>
        <li>
          <a id="menu-admin" onclick="switchMenu('admin')">
            <span class="icon">🏢</span> 행정직원
          </a>
        </li>
      </ul>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="main">
      <div class="page-title" id="pageTitle">학습교사 계약서</div>

      <!-- 필터 -->
      <div class="filter-bar">
        <div class="filter-group">
          <label>이름 검색</label>
          <input type="text" id="searchName" placeholder="직원명 입력" style="width:150px;">
        </div>
        <div class="filter-group">
          <label>작성일 시작</label>
          <input type="date" id="dateFrom">
        </div>
        <div class="filter-group">
          <label>작성일 종료</label>
          <input type="date" id="dateTo">
        </div>
        <div class="filter-group">
          <button class="btn-search" onclick="applyFilter()">검색</button>
          <button class="btn-reset"  onclick="resetFilter()" style="margin-left:6px;">초기화</button>
        </div>
      </div>

      <!-- 테이블 -->
      <div class="table-card">
        <div class="summary" id="summary">불러오는 중...</div>
        <div class="table-wrap">
          <div id="tableArea">
            <div class="loading">
              <div class="spinner"></div>
              데이터를 불러오는 중입니다...
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL     = 'https://script.google.com/macros/s/AKfycbycF38lIhLqSBDgxNVCJZK34HeBOcGmZXqUDzYR2bQ8dcx54XZUe0z5ip2j89K8dFuZ/exec';
  const ALLOWED_DOMAIN = 'impact7.kr';

  let allData     = [];
  let currentMenu = 'tutor'; // tutor | admin

  // =============================================
  // Google 로그인
  // =============================================
  function handleCredential(response) {
    const payload = parseJwt(response.credential);
    const email   = payload.email || '';
    const domain  = email.split('@')[1];

    if (domain !== ALLOWED_DOMAIN) {
      const errEl = document.getElementById('loginError');
      errEl.textContent = `@${ALLOWED_DOMAIN} 계정만 접근 가능합니다. (현재: ${email})`;
      errEl.style.display = 'block';
      return;
    }

    document.getElementById('userEmail').textContent = email;
    document.getElementById('loginView').style.display  = 'none';
    document.getElementById('dashView').classList.add('show');
    loadData();
  }

  function parseJwt(token) {
    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join('')));
  }

  function logout() {
    google.accounts.id.disableAutoSelect();
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('dashView').classList.remove('show');
    allData = [];
  }

  // =============================================
  // 사이드 메뉴 전환
  // =============================================
  function switchMenu(menu) {
    currentMenu = menu;

    // 메뉴 스타일
    document.getElementById('menu-tutor').className = menu === 'tutor' ? 'active' : '';
    document.getElementById('menu-admin').className = menu === 'admin' ? 'active' : '';

    // 페이지 제목
    document.getElementById('pageTitle').textContent =
      menu === 'tutor' ? '학습교사 계약서' : '행정직원 계약서';

    // 필터 초기화 후 테이블 갱신
    document.getElementById('searchName').value = '';
    document.getElementById('dateFrom').value   = '';
    document.getElementById('dateTo').value     = '';

    // 현재 메뉴에 맞는 데이터 로드
    loadData();
  }

  // =============================================
  // 데이터 로드
  // =============================================
  function loadData() {
    document.getElementById('summary').textContent = '불러오는 중...';
    document.getElementById('tableArea').innerHTML =
      '<div class="loading"><div class="spinner"></div>데이터를 불러오는 중입니다...</div>';

    fetch(`${SCRIPT_URL}?action=getData&type=${currentMenu}`)
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          allData = res.data;
          renderTable(allData);
        } else {
          document.getElementById('tableArea').innerHTML =
            `<div class="no-data">데이터 로드 오류: ${res.message}</div>`;
        }
      })
      .catch(err => {
        document.getElementById('tableArea').innerHTML =
          `<div class="no-data">네트워크 오류: ${err.message}</div>`;
      });
  }

  // =============================================
  // 테이블 렌더링
  // =============================================
  function renderTable(data) {
    document.getElementById('summary').textContent = `총 ${data.length}건`;

    if (data.length === 0) {
      document.getElementById('tableArea').innerHTML =
        '<div class="no-data">데이터가 없습니다.</div>';
      return;
    }

    let rows = '';
    data.forEach((row, i) => {
      const pdfBtn = row.pdfUrl
        ? `<a class="btn-pdf" href="${row.pdfUrl}" target="_blank">PDF 열기</a>`
        : `<span style="color:#bbb;font-size:13px;">-</span>`;
      rows += `
        <tr>
          <td>${i + 1}</td>
          <td class="name">${row.직원명  || '-'}</td>
          <td class="addr">${row.주소    || '-'}</td>
          <td>${row.연락처  || '-'}</td>
          <td>${row.주민번호 || '-'}</td>
          <td>${row.작성일   || '-'}</td>
          <td>${pdfBtn}</td>
        </tr>`;
    });

    document.getElementById('tableArea').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>직원명</th>
            <th>주소</th>
            <th>연락처</th>
            <th>주민번호</th>
            <th>작성일</th>
            <th>계약서</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // =============================================
  // 필터
  // =============================================
  function applyFilter() {
    const name     = document.getElementById('searchName').value.trim().toLowerCase();
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo   = document.getElementById('dateTo').value;

    const filtered = allData.filter(row => {
      const nameMatch = !name     || (row.직원명 || '').toLowerCase().includes(name);
      const fromMatch = !dateFrom || (row.작성일 || '') >= dateFrom;
      const toMatch   = !dateTo   || (row.작성일 || '') <= dateTo;
      return nameMatch && fromMatch && toMatch;
    });

    renderTable(filtered);
  }

  function resetFilter() {
    document.getElementById('searchName').value = '';
    document.getElementById('dateFrom').value   = '';
    document.getElementById('dateTo').value     = '';
    renderTable(allData);
  }
</script>
</body>
</html>
